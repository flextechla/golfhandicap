<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Handicap Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2e7d32; --dark: #1b5e20; --accent: #ffa000;
      --bg: #f4f6f8; --text: #333; --white: #ffffff; --danger: #d32f2f;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; }
    
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary), var(--dark));
      color: white; padding: 25px 20px; text-align: center;
      border-bottom: 5px solid var(--accent);
    }
    .hcp-display { font-size: 4rem; font-weight: 900; margin: 10px 0; }
    
    .nav-tabs {
      display: flex; background: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto;
    }
    .tab-link {
      flex: 1; padding: 15px; text-align: center; font-size: 0.75rem;
      font-weight: bold; cursor: pointer; color: #666; border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
    .btn-primary { background: var(--primary); color: white; }
    .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .hidden { display: none !important; }
    .round-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<div id="view-auth" class="container" style="margin-top: 10vh;">
  <div class="card" style="text-align: center;">
    <h2 style="color: var(--primary); margin-top: 0;">⛳ Golf Tracker</h2>
    <p style="color: #666; font-size: 0.9rem;">Sign in to track your handicap</p>
    <input type="email" id="email" class="form-control" placeholder="Email" autocomplete="email">
    <input type="password" id="password" class="form-control" placeholder="Password">
    <button class="btn btn-primary" id="btn-auth" onclick="handleAuth()">Sign In / Create Account</button>
    <p id="auth-msg" style="font-size: 0.8rem; color: var(--danger);"></p>
  </div>
</div>

<div id="view-app" class="hidden">
  <div class="dashboard-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="user-display-name" style="font-weight: bold; font-size: 0.9rem;">Golfer</span>
      <button onclick="sb.auth.signOut()" style="background:none; border:1px solid white; color:white; border-radius:4px; padding:4px 10px; cursor: pointer;">Logout</button>
    </div>
    <div class="hcp-display" id="dash-hcp">--</div>
    <div style="font-size: 0.7rem; opacity: 0.8; letter-spacing: 1px; font-weight: bold;">WHS HANDICAP INDEX</div>
  </div>

  <div class="nav-tabs">
    <div class="tab-link active" onclick="showTab('dash', this)">DASHBOARD</div>
    <div class="tab-link" onclick="showTab('add', this)">ADD SCORE</div>
    <div class="tab-link" onclick="showTab('leader', this)">RANKINGS</div>
    <div class="tab-link" onclick="showTab('manage', this)">COURSES</div>
  </div>

  <div class="container">
    <div id="tab-dash">
      <div class="card">
        <h3 style="margin-top: 0; font-size: 1rem;">Recent Rounds</h3>
        <div id="recent-list"></div>
      </div>
    </div>

    <div id="tab-add" class="hidden">
      <div class="card">
        <h3 style="margin-top: 0;">Post Score</h3>
        <label style="font-size: 0.8rem; font-weight: bold;">SELECT COURSE</label>
        <select id="r-course-select" class="form-control" onchange="autoFillCourse()"></select>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div><label style="font-size: 0.8rem; font-weight: bold;">RATING</label><input type="number" step="0.1" id="r-rating" class="form-control"></div>
          <div><label style="font-size: 0.8rem; font-weight: bold;">SLOPE</label><input type="number" id="r-slope" class="form-control"></div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <div><label style="font-size: 0.8rem; font-weight: bold;">GROSS SCORE</label><input type="number" id="r-score" class="form-control"></div>
          <div><label style="font-size: 0.8rem; font-weight: bold;">DATE</label><input type="date" id="r-date" class="form-control"></div>
        </div>
        
        <button class="btn btn-primary" onclick="saveRound()">Save Round</button>
      </div>
    </div>

    <div id="tab-leader" class="hidden">
      <div class="card">
        <h3 style="margin-top:0;">Global Rankings</h3>
        <div id="lb-list"></div>
      </div>
    </div>

    <div id="tab-manage" class="hidden">
      <div class="card">
        <h3 style="margin-top: 0;">Add Master Course</h3>
        <input type="text" id="c-name" class="form-control" placeholder="Course Name">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <input type="number" step="0.1" id="c-rating" class="form-control" placeholder="Rating">
          <input type="number" id="c-slope" class="form-control" placeholder="Slope">
        </div>
        <button class="btn btn-primary" onclick="addCourse()">Save to Master List</button>
      </div>
    </div>
  </div>
</div>

<script>
  const S_URL = 'https://vonbibroncsxrgstetow.supabase.co';
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvbmJpYnJvbmNzeHJnc3RldG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MjExMTQsImV4cCI6MjA4NDA5NzExNH0.z0x4uu-34dc2cpWK2CTZSGW9gY2a3pl-t1ANk7gyouk';
  const sb = window.supabase.createClient(S_URL, S_KEY);

  let user = null, masterCourses = [];

  // Fix: Improved Auth with loading state
  async function handleAuth() {
    const btn = document.getElementById('btn-auth');
    const msg = document.getElementById('auth-msg');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    if(!email || !password) { msg.textContent = "Enter email and password"; return; }
    
    btn.disabled = true;
    btn.textContent = "Authenticating...";

    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    
    if (error) {
      const { error: signUpErr } = await sb.auth.signUp({ email, password });
      if (signUpErr) {
        msg.textContent = signUpErr.message;
        btn.disabled = false;
        btn.textContent = "Sign In / Create Account";
      }
    }
  }

  // Fix: Clean startApp sequence
  async function startApp(session) {
    user = session.user;
    document.getElementById('view-auth').classList.add('hidden');
    document.getElementById('view-app').classList.remove('hidden');
    document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
    
    // Check if profile exists, if not create it
    const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
    if (!p) {
      const name = user.email.split('@')[0];
      await sb.from('profiles').insert({ id: user.id, display_name: name });
      document.getElementById('user-display-name').textContent = name;
    } else {
      document.getElementById('user-display-name').textContent = p.display_name;
    }

    refreshData();
  }

  async function refreshData() {
    loadDashboard();
    loadCourses();
    if (!document.getElementById('tab-leader').classList.contains('hidden')) loadLeaderboard();
  }

  async function loadDashboard() {
    const { data: p } = await sb.from('profiles').select('handicap_index').eq('id', user.id).single();
    document.getElementById('dash-hcp').textContent = p?.handicap_index || '--';
    
    const { data: rounds } = await sb.from('rounds').select('*').eq('user_id', user.id).order('date_played', {ascending: false});
    document.getElementById('recent-list').innerHTML = rounds?.slice(0, 10).map(r => `
      <div class="round-item">
        <div style="display:flex; flex-direction:column;">
          <span style="font-weight:bold; font-size:1.1rem;">${r.score} <small style="font-weight:normal; color:#666;">at ${r.course_name}</small></span>
          <small style="color:#888;">${r.date_played}</small>
        </div>
        <div style="text-align:right;">
          <span style="font-size:0.7rem; color:#999; font-weight:bold;">DIFF</span><br>
          <span style="font-weight:bold; color:var(--primary);">${r.differential || '--'}</span>
        </div>
      </div>
    `).join('') || '<p style="color:#999; text-align:center;">No rounds recorded yet.</p>';
  }

  async function loadCourses() {
    const { data } = await sb.from('courses').select('*').order('name');
    masterCourses = data || [];
    const sel = document.getElementById('r-course-select');
    sel.innerHTML = '<option value="">-- Select Course --</option>';
    masterCourses.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name} (${c.tee || 'Standard'})</option>`);
  }

  function autoFillCourse() {
    const c = masterCourses.find(x => x.id === document.getElementById('r-course-select').value);
    if (c) {
      document.getElementById('r-rating').value = c.course_rating;
      document.getElementById('r-slope').value = c.slope_rating;
    }
  }

  async function saveRound() {
    const sel = document.getElementById('r-course-select');
    const score = document.getElementById('r-score').value;
    const rating = document.getElementById('r-rating').value;
    const slope = document.getElementById('r-slope').value;

    if(!score || !rating || !slope) return alert("Please fill in all fields.");

    await sb.from('rounds').insert({
      user_id: user.id,
      course_name: sel.selectedIndex > 0 ? sel.options[sel.selectedIndex].text : "Custom Course",
      score: parseInt(score),
      course_rating: parseFloat(rating),
      slope_rating: parseInt(slope),
      date_played: document.getElementById('r-date').value
    });
    
    alert("Round Saved!");
    showTab('dash', document.querySelector('.tab-link'));
    refreshData();
  }

  async function loadLeaderboard() {
    const { data } = await sb.from('profiles').select('*').order('handicap_index', {ascending: true});
    document.getElementById('lb-list').innerHTML = data.map((p, i) => `
      <div class="round-item">
        <span><b style="color:#999; margin-right:10px;">#${i+1}</b> <b>${p.display_name}</b></span>
        <b style="color:var(--primary); font-size:1.2rem;">${p.handicap_index || '--'}</b>
      </div>
    `).join('');
  }

  async function addCourse() {
    const name = document.getElementById('c-name').value;
    const rating = document.getElementById('c-rating').value;
    const slope = document.getElementById('c-slope').value;
    if(!name || !rating || !slope) return alert("Fill in all fields");
    await sb.from('courses').insert({ name, course_rating: parseFloat(rating), slope_rating: parseInt(slope) });
    alert("Course Added!");
    document.getElementById('c-name').value = '';
    loadCourses();
  }

  function showTab(name, el) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (name === 'leader') loadLeaderboard();
  }

  // Fix: Removed location.reload() loop
  sb.auth.onAuthStateChange((ev, sess) => {
    if (sess) {
      startApp(sess);
    } else {
      document.getElementById('view-auth').classList.remove('hidden');
      document.getElementById('view-app').classList.add('hidden');
      const btn = document.getElementById('btn-auth');
      btn.disabled = false;
      btn.textContent = "Sign In / Create Account";
    }
  });
</script>
</body>
</html>
