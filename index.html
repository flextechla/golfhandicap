<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Master Recovery</title>
    <style>
        :root { --primary: #d32f2f; --dark: #b71c1c; --bg: #fdfdfd; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); padding: 15px; color: #333; }
        .dashboard { background: #333; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 5px solid red; }
        .handicap { font-size: 3rem; font-weight: bold; }
        .card { background: white; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ccc; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .recovery-btn { background: #fb8c00; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .score-item { background: #f1f1f1; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.9rem; border-left: 5px solid var(--primary); }
        button { width: 100%; padding: 12px; background: #2E7D32; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .found-label { color: var(--primary); font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="font-size: 0.8rem; letter-spacing: 2px;">EMERGENCY RECOVERY MODE</div>
    <div class="handicap" id="idx">--</div>
    <div id="pDisp">Searching...</div>
</div>

<div class="card">
    <span class="found-label">STEP 1: PHONE MEMORY SCAN</span>
    <p style="font-size: 0.8rem;">Click this to search your phone for any "lost" golf data from previous versions.</p>
    <button class="recovery-btn" onclick="deepScan()">🔍 SCAN PHONE FOR LOST DATA</button>
</div>

<div class="card">
    <span class="found-label">STEP 2: CLOUD RESCUE</span>
    <label>Enter Name (Ex: Don)</label>
    <input type="text" id="nameIn" placeholder="Don">
    <label>Group Key</label>
    <input type="text" id="keyIn" value="Masters2026">
    <button onclick="cloudPull()">☁️ PULL FROM CLOUD</button>
</div>

<div class="card">
    <span class="found-label">STEP 3: RECOVERED SCORES</span>
    <div id="sList">No scores found yet.</div>
</div>

<div class="card">
    <span class="found-label">STEP 4: RECOVERED COURSES</span>
    <div id="cList">No courses found yet.</div>
</div>

<script>
    // Global Data Holders
    var scores = [];
    var courses = [];
    var pName = "";

    // --- DEEP SCAN: The Nuclear Option ---
    function deepScan() {
        console.log("Starting Deep Scan...");
        let foundScores = [];
        let foundCourses = [];

        // Loop through EVERY key in the phone's storage
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            let val = localStorage.getItem(key);

            try {
                let parsed = JSON.parse(val);
                
                // If it's an array and contains things that look like scores
                if (Array.isArray(parsed)) {
                    if (parsed.length > 0 && (parsed[0].score || parsed[0].rating)) {
                        if (parsed[0].score) {
                            console.log("Found Scores in: " + key);
                            foundScores = foundScores.concat(parsed);
                        } else if (parsed[0].rating) {
                            console.log("Found Courses in: " + key);
                            foundCourses = foundCourses.concat(parsed);
                        }
                    }
                }
            } catch (e) { /* Not JSON, skip */ }
        }

        if (foundScores.length > 0) {
            scores = foundScores;
            // Remove duplicates based on date and score
            scores = scores.filter((v,i,a)=>a.findIndex(t=>(t.date===v.date && t.score===v.score))===i);
            alert("Found " + scores.length + " scores in phone memory!");
        }
        
        if (foundCourses.length > 0) {
            courses = foundCourses;
            courses = courses.filter((v,i,a)=>a.findIndex(t=>(t.name===v.name && t.tee===v.tee))===i);
        }

        render();
    }

    // --- CLOUD PULL ---
    async function cloudPull() {
        let name = document.getElementById('nameIn').value.trim();
        let key = document.getElementById('keyIn').value.trim();
        if (!name) return alert("Enter your name");
        
        pName = name;
        const binId = btoa(key).replace(/=/g, "");
        
        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            let cloud = await res.json();
            
            if (cloud.players && cloud.players[name]) {
                scores = cloud.players[name].history;
                courses = cloud.courses || courses;
                alert("Cloud Sync Successful!");
            } else {
                alert("Name not found in this Cloud Key.");
            }
            render();
        } catch (e) {
            alert("Cloud Error. Check internet and key.");
        }
    }

    function calc() {
        if (scores.length < 3) return "--";
        let diffs = scores.map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = scores.length >= 20 ? 8 : (scores.length >= 10 ? 3 : 1);
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function render() {
        document.getElementById('idx').innerText = calc();
        document.getElementById('pDisp').innerText = pName || "Data Found";

        let sl = document.getElementById('sList');
        sl.innerHTML = "";
        scores.forEach(s => {
            sl.innerHTML += `<div class="score-item"><b>${s.score}</b> at ${s.courseName||s.course} (${s.date})</div>`;
        });

        let cl = document.getElementById('cList');
        cl.innerHTML = "";
        courses.forEach(c => {
            cl.innerHTML += `<div class="score-item"><b>${c.name}</b> (${c.tee}) - R:${c.rating} S:${c.slope}</div>`;
        });

        // Save what we found so it sticks
        if (pName) localStorage.setItem('scores_' + pName, JSON.stringify(scores));
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
    }

    // Attempt to load current profile on start
    window.onload = () => {
        let savedName = localStorage.getItem('golf_pname');
        if (savedName) {
            pName = savedName;
            let savedScores = localStorage.getItem('scores_' + pName);
            if (savedScores) scores = JSON.parse(savedScores);
            render();
        }
    };
</script>
</body>
</html>
