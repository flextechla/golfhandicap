<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Total Cloud Recovery</title>
    <style>
        :root { --primary: #1976D2; --dark: #0D47A1; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; padding: 15px; }
        .status-box { background: #fff3e0; border: 1px solid #ffe0b2; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        button { width: 100%; padding: 15px; background: #2E7D32; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .user-pill { display: inline-block; padding: 12px 18px; background: #e3f2fd; border: 2px solid #2196f3; border-radius: 25px; margin: 5px; cursor: pointer; font-weight: bold; }
        .score-item { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #2E7D32; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp" style="font-size: 1.2rem;">Cloud Recovery Mode</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.9;">WHS HANDICAP INDEX</div>
</div>

<div class="status-box" id="statusArea">
    <b style="color: #e65100;">ACTION REQUIRED:</b><br>
    Click the button below to scan the cloud for your lost data.
    <button onclick="scanCloud()" style="margin-top:10px;">🔍 SCAN CLOUD FOR ALL PLAYERS</button>
</div>

<div id="results" style="display:none;">
    <div class="card">
        <label><b>1. Select the name to restore:</b></label>
        <div id="playerList" style="margin-top:10px;"></div>
    </div>

    <div class="card">
        <label><b>2. Recovered Course Database:</b></label>
        <div id="courseList" style="margin-top:10px; font-size: 0.8rem;"></div>
    </div>

    <div class="card">
        <label><b>3. Recovered History for Selected:</b></label>
        <div id="historyList" style="margin-top:10px;"></div>
    </div>
</div>

<script>
    const MASTER_KEY = "Masters2026";
    let cloudData = null;

    async function scanCloud() {
        const binId = btoa(MASTER_KEY).replace(/=/g, "");
        const status = document.getElementById('statusArea');
        status.innerText = "Searching Cloud Bin: " + binId + "...";

        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            if (!res.ok) throw new Error("Bin not found");
            
            cloudData = await res.json();
            
            if (!cloudData.players || Object.keys(cloudData.players).length === 0) {
                status.innerHTML = "❌ Bin found, but it is empty. Did you use a different Group Key?";
                return;
            }

            status.innerHTML = "✅ Data Found! Select your name below.";
            document.getElementById('results').style.display = "block";
            
            // Show Names
            const pList = document.getElementById('playerList');
            pList.innerHTML = "";
            Object.keys(cloudData.players).forEach(name => {
                pList.innerHTML += `<div class="user-pill" onclick="restoreName('${name}')">${name}</div>`;
            });

            // Show Courses
            const cList = document.getElementById('courseList');
            cList.innerHTML = cloudData.courses.map(c => `• ${c.name} (${c.tee})`).join('<br>');
            
            // Save courses immediately
            localStorage.setItem('golfCourses_v14', JSON.stringify(cloudData.courses));

        } catch (e) {
            status.innerHTML = "❌ Could not connect to Cloud. Check internet.";
        }
    }

    function restoreName(name) {
        const player = cloudData.players[name];
        const scores = player.history || [];
        
        // Save to Phone
        localStorage.setItem('golf_pname', name);
        localStorage.setItem('scores_' + name, JSON.stringify(scores));
        localStorage.setItem('knownUsers', JSON.stringify(Object.keys(cloudData.players)));
        
        // Update Screen
        document.getElementById('pDisp').innerText = name;
        document.getElementById('idx').innerText = player.index || "--";
        
        const hList = document.getElementById('historyList');
        hList.innerHTML = scores.map(s => `
            <div class="score-item">
                <b>${s.score}</b> at ${s.courseName||s.course}<br>
                <small>${s.date} | Diff: ${s.diff}</small>
            </div>
        `).join('');

        alert("Restored " + name + " successfully! You can now refresh the page or wait to return to the main app.");
        
        // Final Step: After 3 seconds, reload back to a working version
        // (For now, just stay here so you can see the data is back)
    }
</script>
</body>
</html>
