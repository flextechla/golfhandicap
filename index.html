<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Clubhouse</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 4px solid var(--accent); }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; min-height: 4rem; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        .header { background: #eee; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .content { padding: 15px; display: none; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 4px; margin-right: 4px; }
        .user-pill { display: inline-block; padding: 8px 12px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 20px; margin: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .active-pill { background: var(--dark); color: white; border-color: var(--dark); }
        .commish-badge { background: black; color: gold; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; margin-top: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp" style="font-size: 1.2rem; font-weight: bold;">Golf Tracker</div>
    <div class="handicap" id="idx">--</div>
    <div id="roleBadge"></div>
</div>

<div id="setupCard" class="card" style="display:none;">
    <div class="header"><span>🚀 Initial Setup</span></div>
    <div class="content" style="display:block;">
        <label>Your Name:</label><input type="text" id="setupName" placeholder="Ex: Don">
        <label>Group Key (golf2026 for Admin):</label><input type="text" id="setupKey" placeholder="Masters2026">
        <button onclick="firstTimeSetup()">Start Using App</button>
    </div>
</div>

<div id="mainApp" style="display:none;">
    <div class="card">
        <div class="header" onclick="menuToggle('club')"><span>👥 Clubhouse (Switch View)</span><span>▼</span></div>
        <div id="club" class="content">
            <div id="userList"></div>
            <button onclick="sync()" style="background:var(--dark); margin-top:15px;">☁️ Sync & Refresh Clubhouse</button>
            <button onclick="resetApp()" style="background:none; color:red; font-size:10px; border:none; margin-top:20px;">Reset My Identity</button>
        </div>
    </div>

    <div id="entryCard" class="card">
        <div class="header" onclick="menuToggle('post')"><span>⛳ Add New Score</span><span>▼</span></div>
        <div id="post" class="content">
            <label>Course</label><select id="cSel"></select>
            <label>Date</label><input type="date" id="dIn">
            <label>Gross Score</label><input type="number" id="sIn">
            <button onclick="addS()">Save Score</button>
        </div>
    </div>

    <div class="card">
        <div class="header" onclick="menuToggle('hist')"><span>📝 Score History</span><span>▼</span></div>
        <div id="hist" class="content"><div id="sList"></div></div>
    </div>

    <div id="courseCard" class="card">
        <div class="header" onclick="menuToggle('course')"><span>⛳ Manage Courses</span><span>▼</span></div>
        <div id="course" class="content">
            <button onclick="menuToggle('nc')">+ Add New Course</button>
            <div id="nc" class="content" style="border:1px dashed #ccc; padding:10px; margin: 10px 0;">
                <input type="text" id="ncN" placeholder="Course Name">
                <input type="text" id="ncT" placeholder="Tee Color">
                <input type="number" id="ncR" step="0.1" placeholder="Rating">
                <input type="number" id="ncS" placeholder="Slope">
                <button onclick="addC()">Save Course</button>
            </div>
            <div id="cList"></div>
        </div>
    </div>
</div>

<script>
    function menuToggle(id) {
        var x = document.getElementById(id);
        if (x) x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    const GROUP_KEY = "Masters2026";
    const ADMIN_PASS = "golf2026";

    var myName = localStorage.getItem('my_primary_name') || "";
    var myKey = localStorage.getItem('my_group_key') || "";
    var currentViewing = myName;
    var isCommish = (myKey === ADMIN_PASS);
    
    // Recovery Logic: Prioritize any legacy course data found
    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || 
                  JSON.parse(localStorage.getItem('golfCourses')) || [];
    var scores = [];
    var knownUsers = JSON.parse(localStorage.getItem('knownUsers')) || [];

    function firstTimeSetup() {
        let n = document.getElementById('setupName').value.trim();
        let k = document.getElementById('setupKey').value.trim();
        if(!n || !k) return alert("Fill in both boxes!");
        localStorage.setItem('my_primary_name', n);
        localStorage.setItem('my_group_key', k);
        location.reload();
    }

    function resetApp() { if(confirm("Erase identity?")) { localStorage.clear(); location.reload(); } }

    function switchView(target) { 
        currentViewing = target; 
        loadScores(); 
        render(); 
    }

    function loadScores() {
        let storageKey = (currentViewing === myName) ? 'scores_' + myName : 'cloud_' + currentViewing;
        let saved = localStorage.getItem(storageKey);
        
        // RECOVERY: If specific folder is empty, check legacy scores_v14 folder
        if (!saved && currentViewing === myName) {
            saved = localStorage.getItem('golfScores_v14') || localStorage.getItem('scores');
            if (saved) localStorage.setItem(storageKey, saved); // Migrate to new folder
        }
        
        scores = saved ? JSON.parse(saved) : [];
    }

    function calc() {
        if (!scores || scores.length < 3) return "--";
        let diffs = [...scores].map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = scores.length >= 20 ? 8 : (scores.length >= 10 ? 3 : 1);
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function render() {
        const canEdit = (currentViewing === myName || isCommish);
        document.getElementById('idx').innerText = calc();
        document.getElementById('pDisp').innerText = currentViewing + (currentViewing === myName ? " (You)" : "");
        document.getElementById('roleBadge').innerHTML = isCommish ? '<span class="commish-badge">COMMISSIONER</span>' : '';
        
        document.getElementById('entryCard').style.display = canEdit ? "block" : "none";
        document.getElementById('courseCard').style.display = canEdit ? "block" : "none";

        var uL = document.getElementById('userList');
        uL.innerHTML = "";
        if(myName && !knownUsers.includes(myName)) knownUsers.push(myName);
        knownUsers.sort().forEach(u => {
            uL.innerHTML += `<span class="user-pill ${u === currentViewing ? 'active-pill' : ''}" onclick="switchView('${u}')">${u}</span>`;
        });

        var sel = document.getElementById('cSel');
        sel.innerHTML = '<option value="">-- Select Course --</option>';
        courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, i) => {
            sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
        });

        var sl = document.getElementById('sList');
        sl.innerHTML = scores.length ? "" : "<small>No scores found.</small>";
        scores.forEach((s, i) => {
            sl.innerHTML += `<div class="score-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${s.score}</b> at ${s.courseName||s.course} (${s.teeColor||''})<br><small>${s.date} | Diff: ${s.diff}</small></div>
                    ${canEdit ? `<div>
                        <button class="btn-outline" onclick="menuToggle('ed-s-${i}')">Edit</button>
                        <button class="btn-outline" style="color:red" onclick="delS(${i})">Del</button>
                    </div>` : ''}
                </div>
                <div id="ed-s-${i}" class="edit-drawer">
                    <label>New Score</label><input type="number" id="ev-${i}" value="${s.score}">
                    <button onclick="updateS(${i})">Save Changes</button>
                </div>
            </div>`;
        });

        var cl = document.getElementById('cList');
        cl.innerHTML = "";
        courses.forEach((c, i) => {
            cl.innerHTML += `<div class="score-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${c.name}</b> (${c.tee})<br><small>R: ${c.rating} S: ${c.slope}</small></div>
                    <div>
                        <button class="btn-outline" onclick="menuToggle('ed-c-${i}')">Edit</button>
                        <button class="btn-outline" style="color:red" onclick="delC(${i})">Del</button>
                    </div>
                </div>
                <div id="ed-c-${i}" class="edit-drawer">
                    <label>Rating</label><input type="number" id="er-${i}" value="${c.rating}" step="0.1">
                    <label>Slope</label><input type="number" id="es-${i}" value="${c.slope}">
                    <button onclick="updateC(${i})">Update Course</button>
                </div>
            </div>`;
        });
    }

    async function sync() {
        const binId = btoa(isCommish ? GROUP_KEY : myKey).replace(/=/g, "");
        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            
            if(isCommish && currentViewing !== myName) { 
                cloud.players[currentViewing] = { index: calc(), history: scores }; 
            } else {
                loadScores();
                cloud.players[myName] = { index: calc(), history: scores.slice(0, 10) };
            }

            // Sync Database
            let cmap = new Map();
            [...cloud.courses, ...courses].forEach(c => cmap.set(c.name+c.tee, c));
            cloud.courses = Array.from(cmap.values()); courses = cloud.courses;
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
            
            knownUsers = Object.keys(cloud.players);
            localStorage.setItem('knownUsers', JSON.stringify(knownUsers));
            
            knownUsers.forEach(u => { 
                if(u !== myName && !isCommish) localStorage.setItem('cloud_' + u, JSON.stringify(cloud.players[u].history)); 
            });

            await fetch("https://api.jsonstorage.net/v1/json/" + binId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cloud) });
            render(); 
            alert("Clubhouse Updated!");
        } catch (e) { alert("Sync Error"); }
    }

    function addS() {
        var cIdx = document.getElementById('cSel').value; var val = parseFloat(document.getElementById('sIn').value);
        if(cIdx === "" || isNaN(val)) return alert("Select course and score");
        var c = courses[cIdx];
        var d = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('dIn').value, courseName: c.name, teeColor: c.tee, score: val, diff: d });
        localStorage.setItem((currentViewing === myName) ? 'scores_' + myName : 'cloud_' + currentViewing, JSON.stringify(scores)); 
        render();
    }

    function updateS(i) {
        var newVal = parseFloat(document.getElementById('ev-'+i).value);
        let s = scores[i];
        var c = courses.find(x => x.name === s.courseName && x.tee === s.teeColor);
        if(c && !isNaN(newVal)) {
            scores[i].score = newVal;
            scores[i].diff = ((newVal - c.rating) * 113 / c.slope).toFixed(1);
            localStorage.setItem((currentViewing === myName) ? 'scores_' + myName : 'cloud_' + currentViewing, JSON.stringify(scores));
            render();
        }
    }

    function addC() {
        courses.push({ name: document.getElementById('ncN').value, tee: document.getElementById('ncT').value, rating: parseFloat(document.getElementById('ncR').value), slope: parseInt(document.getElementById('ncS').value) });
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render();
    }

    function updateC(i) {
        courses[i].rating = parseFloat(document.getElementById('er-'+i).value);
        courses[i].slope = parseInt(document.getElementById('es-'+i).value);
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render();
    }

    function delS(i) { if(confirm("Delete?")) { scores.splice(i, 1); localStorage.setItem((currentViewing === myName) ? 'scores_' + myName : 'cloud_' + currentViewing, JSON.stringify(scores)); render(); } }
    function delC(i) { if(confirm("Delete?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render(); } }

    // Init
    document.getElementById('dIn').valueAsDate = new Date();
    if(!myName) {
        document.getElementById('setupCard').style.display = "block";
    } else {
        document.getElementById('mainApp').style.display = "block";
        loadScores();
        render();
    }
</script>
</body>
</html>
