<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Pro (Admin)</title>
    <style>
        :root {
            --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000;
            --bg: #f4f6f8; --text: #333; --white: #ffffff;
            --danger: #d32f2f; --success: #4CAF50; --info: #0288d1;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .dashboard-card { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .handicap-number { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 5px 0; }
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 15px; overflow: hidden; }
        .card-header { font-weight: 700; font-size: 1.1rem; color: var(--dark); display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 10px 0; user-select: none; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: #555; }
        select, input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:disabled { background: #ccc !important; color: #666; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: var(--info); color: white; margin-top: 10px; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; width: auto; border-radius: 4px; border: 1px solid #ddd; background: white; }
        .score-item { background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; list-style: none; }
        .hidden { display: none; }
        .arrow { transition: transform 0.2s; font-size: 0.8rem; }
        .collapsed .arrow { transform: rotate(-90deg); }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .admin-tag { background: #000; color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-card">
        <div id="pNameDisplay" style="font-weight:bold; margin-bottom:5px;">Golfer</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">WHS HANDICAP INDEX</div>
    </div>

    <div class="card">
        <div class="card-header collapsed" onclick="toggleSection('syncBox', this)">
            <span>👥 Clubhouse Setup & Sync</span><span class="arrow">▼</span>
        </div>
        <div id="syncBox" class="hidden" style="padding-top:10px;">
            <label>Current User Name</label>
            <input type="text" id="playerNameInput" onchange="switchUser()" placeholder="Change name to switch history">
            <label>Group Secret Key</label>
            <input type="text" id="groupKeyInput" onchange="saveSyncSettings()">
            <button class="btn-sync" id="syncBtn" onclick="syncWithFriends()">🔄 Sync & Update Cloud</button>
        </div>
    </div>

    <div id="clubhouseCard" class="card hidden">
        <div class="card-header"><span>🏆 Clubhouse Leaderboard</span></div>
        <div id="clubhouseList" style="padding:15px 0;"></div>
    </div>

    <div class="card">
        <div class="card-header collapsed" onclick="toggleSection('postNewScoreBox', this)">
            <span>⛳ Post New Score</span><span class="arrow">▼</span>
        </div>
        <div id="postNewScoreBox" class="hidden" style="padding-top:10px;">
            <label>Course</label>
            <select id="mainCourseSelect" onchange="updateCoursePreview('mainCoursePre', 'mainCourseSelect')"></select>
            <div id="mainCoursePre" style="font-size:0.8rem; text-align:center; color:var(--primary); margin-bottom:10px; font-weight:bold;"></div>
            <div class="row">
                <div class="col"><label>Date</label><input type="date" id="mainScoreDate"></div>
                <div class="col"><label>Score</label><input type="number" id="mainScoreVal" placeholder="--"></div>
            </div>
            <button id="mainPostBtn" class="btn-primary" onclick="submitNewScore()" disabled>Save Round</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header" onclick="toggleSection('historyContent', this)">
            <span>📝 Score History</span><span class="arrow">▼</span>
        </div>
        <div id="historyContent" class="hidden">
            <ul id="scoreList" class="score-list" style="padding:0;"></ul>
        </div>
    </div>

    <div class="card">
        <div class="card-header collapsed" onclick="toggleSection('courseDbContent', this)">
            <span>⛳ Manage Course Database</span><span class="arrow">▼</span>
        </div>
        <div id="courseDbContent" class="hidden">
            <button class="btn-primary" style="margin:15px 0;" onclick="toggleSection('newCourseForm', null)">+ Add New Course</button>
            <div id="newCourseForm" class="hidden edit-drawer">
                <label>Name</label><input type="text" id="ncName">
                <label>Tee</label><input type="text" id="ncTee">
                <div class="row">
                    <div class="col"><label>Rating</label><input type="number" id="ncRating" step="0.1"></div>
                    <div class="col"><label>Slope</label><input type="number" id="ncSlope"></div>
                </div>
                <button class="btn-primary" onclick="addNewCourse()">Save Course</button>
            </div>
            <ul id="courseDbList" class="score-list" style="padding:0;"></ul>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://api.jsonstorage.net/v1/json/";
    
    // --- ADMIN SETTING ---
    const ADMIN_USER = "Admin"; // Set this to the name you want to use for Admin rights

    let courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    let playerName = localStorage.getItem('golf_pname') || "";
    let groupKey = localStorage.getItem('golf_gkey') || "";
    
    // Multi-user score loading
    let scores = [];
    function loadUserScores() {
        const key = playerName ? `scores_${playerName}` : 'golfScores_v14';
        scores = JSON.parse(localStorage.getItem(key)) || [];
    }

    function init() {
        document.getElementById('mainScoreDate').valueAsDate = new Date();
        document.getElementById('playerNameInput').value = playerName;
        document.getElementById('groupKeyInput').value = groupKey;
        loadUserScores();
        updateUI();
        if(playerName && groupKey) syncWithFriends(true); 
    }

    function switchUser() {
        playerName = document.getElementById('playerNameInput').value;
        localStorage.setItem('golf_pname', playerName);
        loadUserScores();
        updateUI();
    }

    function saveSyncSettings() {
        groupKey = document.getElementById('groupKeyInput').value;
        localStorage.setItem('golf_gkey', groupKey);
    }

    function toggleSection(id, header) {
        const el = document.getElementById(id);
        el.classList.toggle('hidden');
        if(header) header.classList.toggle('collapsed');
    }

    function updateUI() {
        const display = playerName === ADMIN_USER ? `${playerName} <span class="admin-tag">ADMIN</span>` : (playerName || "Golfer");
        document.getElementById('pNameDisplay').innerHTML = display;
        courses.sort((a,b) => a.name.localeCompare(b.name));
        renderDropdowns();
        renderScoreList();
        renderCourseDb();
        calculateHandicap();
    }

    function calculateHandicap(targetScores = scores) {
        if (targetScores.length < 3) return "--";
        let diffs = [...targetScores].map(r => parseFloat(r.diff)).sort((a,b) => a-b);
        let n = targetScores.length >= 20 ? 8 : (targetScores.length >= 15 ? 5 : (targetScores.length >= 10 ? 3 : 1));
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        const final = (Math.floor(avg * 10) / 10).toFixed(1);
        if (targetScores === scores) document.getElementById('displayIndex').innerText = final;
        return final;
    }

    function renderDropdowns() {
        const sel = document.getElementById('mainCourseSelect');
        sel.innerHTML = '<option value="">-- Choose Course --</option>';
        courses.forEach((c, i) => {
            sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
        });
    }

    function updateCoursePreview(previewId, selectId) {
        const idx = document.getElementById(selectId).value;
        const box = document.getElementById(previewId);
        const btn = document.getElementById('mainPostBtn');
        if (idx === "") { box.innerText = ""; if(btn) btn.disabled = true; return; }
        const c = courses[idx];
        box.innerText = `R: ${c.rating} / S: ${c.slope}`;
        if(btn) btn.disabled = false;
    }

    function submitNewScore() {
        const cIdx = document.getElementById('mainCourseSelect').value;
        const val = parseFloat(document.getElementById('mainScoreVal').value);
        const c = courses[cIdx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('mainScoreDate').value, courseName: c.name, score: val, diff: diff });
        localStorage.setItem(playerName ? `scores_${playerName}` : 'golfScores_v14', JSON.stringify(scores));
        document.getElementById('mainScoreVal').value = "";
        updateUI();
        syncWithFriends(true);
    }

    function renderScoreList() {
        const list = document.getElementById('scoreList');
        list.innerHTML = "";
        scores.forEach((s, i) => {
            list.innerHTML += `
                <li class="score-item">
                    <div class="score-top">
                        <div><small>${s.date}</small><br><strong>${s.courseName}</strong></div>
                        <div style="text-align:right"><strong>${s.score}</strong><br><small>Diff: ${s.diff}</small></div>
                    </div>
                    <div style="text-align:right; margin-top:8px;">
                        <button class="btn-sm" onclick="toggleSection('edit-score-box-${i}', null)">Edit</button>
                        <button class="btn-sm" style="color:red" onclick="deleteScore(${i})">Del</button>
                    </div>
                    <div id="edit-score-box-${i}" class="hidden edit-drawer">
                        <label>Course</label>
                        <select id="edit-score-sel-${i}" onchange="updateCoursePreview('edit-score-pre-${i}', 'edit-score-sel-${i}')"></select>
                        <div id="edit-score-pre-${i}" style="font-size:0.75rem; text-align:center; color:var(--primary); margin-bottom:5px; font-weight:bold;"></div>
                        <div class="row">
                            <div class="col"><label>Date</label><input type="date" id="edit-score-date-${i}" value="${s.date}"></div>
                            <div class="col"><label>Score</label><input type="number" id="edit-score-val-${i}" value="${s.score}"></div>
                        </div>
                        <button class="btn-primary" onclick="updateRound(${i})">Save Changes</button>
                    </div>
                </li>`;
            
            setTimeout(() => {
                const sel = document.getElementById(`edit-score-sel-${i}`);
                if(!sel) return;
                sel.innerHTML = '<option value="">-- Choose Course --</option>';
                courses.forEach((c, idx) => {
                    sel.innerHTML += `<option value="${idx}">${c.name} (${c.tee})</option>`;
                });
                const cIdx = courses.findIndex(c => c.name === s.courseName);
                if(cIdx !== -1) { sel.value = cIdx; updateCoursePreview(`edit-score-pre-${i}`, `edit-score-sel-${i}`); }
            }, 0);
        });
    }

    function updateRound(i) {
        const cIdx = document.getElementById(`edit-score-sel-${i}`).value;
        const val = parseFloat(document.getElementById(`edit-score-val-${i}`).value);
        const c = courses[cIdx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores[i] = { date: document.getElementById(`edit-score-date-${i}`).value, courseName: c.name, score: val, diff: diff };
        localStorage.setItem(playerName ? `scores_${playerName}` : 'golfScores_v14', JSON.stringify(scores));
        updateUI();
        syncWithFriends(true);
    }

    function deleteScore(i) { if(confirm("Delete round?")) { scores.splice(i, 1); localStorage.setItem(playerName ? `scores_${playerName}` : 'golfScores_v14', JSON.stringify(scores)); updateUI(); syncWithFriends(true); } }

    function renderCourseDb() {
        const list = document.getElementById('courseDbList');
        list.innerHTML = "";
        courses.forEach((c, i) => {
            list.innerHTML += `
                <li class="score-item">
                    <div class="score-top"><div><strong>${c.name}</strong> (${c.tee})<br><small>R: ${c.rating} / S: ${c.slope}</small></div>
                    <div><button class="btn-sm" onclick="toggleSection('edit-course-box-${i}', null)">Edit</button>
                    <button class="btn-sm" style="color:red" onclick="deleteCourse(${i})">Del</button></div></div>
                    <div id="edit-course-box-${i}" class="hidden edit-drawer">
                        <label>Name</label><input type="text" id="edit-cname-${i}" value="${c.name}">
                        <label>Tee</label><input type="text" id="edit-ctee-${i}" value="${c.tee}">
                        <div class="row"><div class="col"><label>Rating</label><input type="number" id="edit-crat-${i}" step="0.1" value="${c.rating}"></div>
                        <div class="col"><label>Slope</label><input type="number" id="edit-cslo-${i}" value="${c.slope}"></div></div>
                        <button class="btn-primary" onclick="updateCourse(${i})">Save Course</button>
                    </div>
                </li>`;
        });
    }

    function addNewCourse() {
        const name = document.getElementById('ncName').value;
        const tee = document.getElementById('ncTee').value;
        const rat = parseFloat(document.getElementById('ncRating').value);
        const slo = parseInt(document.getElementById('ncSlope').value);
        courses.push({name, tee, rating: rat, slope: slo});
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        document.getElementById('ncName').value = "";
        toggleSection('newCourseForm');
        updateUI();
    }

    function updateCourse(i) {
        courses[i] = {
            name: document.getElementById(`edit-cname-${i}`).value,
            tee: document.getElementById(`edit-ctee-${i}`).value,
            rating: parseFloat(document.getElementById(`edit-crat-${i}`).value),
            slope: parseInt(document.getElementById(`edit-cslo-${i}`).value)
        };
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        updateUI();
    }

    function deleteCourse(i) { if(confirm("Delete?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); updateUI(); } }

    // --- SYNC WITH ADMIN POWER ---
    async function syncWithFriends(isSilent = false) {
        if(!playerName || !groupKey) return;
        const binId = btoa(groupKey).replace(/=/g, "");
        if(!isSilent) document.getElementById('syncBtn').innerText = "Syncing...";

        try {
            const res = await fetch(`${API_BASE}${binId}`);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            
            // Push current user data
            cloud.players[playerName] = { 
                index: document.getElementById('displayIndex').innerText, 
                history: scores.slice(0, 10) 
            };
            
            // Course Sync
            let cmap = new Map();
            [...cloud.courses, ...courses].forEach(c => cmap.set(`${c.name}-${c.tee}`, c));
            cloud.courses = Array.from(cmap.values());
            courses = cloud.courses;

            await fetch(`${API_BASE}${binId}`, { 
                method: 'PUT', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(cloud) 
            });

            renderClubhouse(cloud);
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
            updateUI();
            if(!isSilent) alert("Updated!");
        } catch (e) { if(!isSilent) alert("Sync failed."); }
        document.getElementById('syncBtn').innerText = "🔄 Sync & Update Cloud";
    }

    function renderClubhouse(cloud) {
        const list = document.getElementById('clubhouseList');
        document.getElementById('clubhouseCard').classList.remove('hidden');
        list.innerHTML = "";
        
        for (let name in cloud.players) {
            if (name === playerName) continue;
            const p = cloud.players[name];
            list.innerHTML += `
                <div class="score-item">
                    <div class="score-top">
                        <span>👤 <strong>${name}</strong>: ${p.index}</span>
                        <button class="btn-sm" onclick="toggleSection('f-hist-${name}')">History</button>
                    </div>
                    <div id="f-hist-${name}" class="hidden" style="margin-top:10px; font-size:0.8rem;">
                        ${p.history.map((s, idx) => `
                            <div style="border-bottom:1px solid #eee; padding:5px 0; display:flex; justify-content:space-between;">
                                <span>${s.date}: ${s.score}</span>
                                ${playerName === ADMIN_USER ? `<button style="color:red; border:none; background:none; cursor:pointer;" onclick="adminDelete('${name}', ${idx})">Del</button>` : ''}
                            </div>`).join('')}
                    </div>
                </div>`;
        }
    }

    async function adminDelete(targetPlayer, scoreIdx) {
        if(!confirm(`Admin: Delete ${targetPlayer}'s score?`)) return;
        const binId = btoa(groupKey).replace(/=/g, "");
        const res = await fetch(`${API_BASE}${binId}`);
        let cloud = await res.json();
        
        cloud.players[targetPlayer].history.splice(scoreIdx, 1);
        cloud.players[targetPlayer].index = calculateHandicap(cloud.players[targetPlayer].history);
        
        await fetch(`${API_BASE}${binId}`, { 
            method: 'PUT', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify(cloud) 
        });
        renderClubhouse(cloud);
    }

    init();
</script>
</body>
</html>
