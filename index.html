<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Handicap Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2e7d32; --dark: #1b5e20; --accent: #ffa000;
      --bg: #f4f6f8; --text: #333; --white: #ffffff;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; }
    
    /* Golf Gradient Header */
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary), var(--dark));
      color: white; padding: 25px 20px; text-align: center;
      border-bottom: 5px solid var(--accent);
    }
    .hcp-display { font-size: 4rem; font-weight: 900; margin: 10px 0; }
    
    /* Navigation Tabs */
    .nav-tabs {
      display: flex; background: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto;
    }
    .tab-link {
      flex: 1; padding: 15px; text-align: center; font-size: 0.8rem;
      font-weight: bold; cursor: pointer; color: #666; border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #ddd; }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
    .btn-primary { background: var(--primary); color: white; }
    .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
    .hidden { display: none !important; }
    .round-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<div id="view-auth" class="container" style="margin-top: 10vh;">
  <div class="card" style="text-align: center;">
    <h2 style="color: var(--primary);">⛳ Golf Tracker Login</h2>
    <input type="email" id="email" class="form-control" placeholder="Email">
    <input type="password" id="password" class="form-control" placeholder="Password">
    <button class="btn btn-primary" onclick="handleAuth()">Sign In / Sign Up</button>
  </div>
</div>

<div id="view-app" class="hidden">
  <div class="dashboard-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="user-name" style="font-weight: bold;">Golf Tracker</span>
      <button onclick="sb.auth.signOut()" style="background:none; border:1px solid white; color:white; border-radius:4px; padding:4px 8px;">Logout</button>
    </div>
    <div class="hcp-display" id="dash-hcp">--</div>
    <div style="font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px;">WHS HANDICAP INDEX</div>
  </div>

  <div class="nav-tabs">
    <div class="tab-link active" onclick="showTab('dash', this)">DASHBOARD</div>
    <div class="tab-link" onclick="showTab('add', this)">ADD SCORE</div>
    <div class="tab-link" onclick="showTab('leader', this)">RANKINGS</div>
    <div class="tab-link" onclick="showTab('manage', this)">GROUPS/COURSES</div>
  </div>

  <div class="container">
    <div id="tab-dash">
      <div class="card">
        <h3 style="margin-top: 0;">Recent Scores</h3>
        <div id="recent-list"></div>
      </div>
    </div>

    <div id="tab-add" class="hidden">
      <div class="card">
        <h3>Post New Round</h3>
        <label>Course</label>
        <select id="r-course-select" class="form-control" onchange="autoFillCourse()"></select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div><label>Rating</label><input type="number" step="0.1" id="r-rating" class="form-control"></div>
          <div><label>Slope</label><input type="number" id="r-slope" class="form-control"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div><label>Score</label><input type="number" id="r-score" class="form-control"></div>
          <div><label>Date</label><input type="date" id="r-date" class="form-control"></div>
        </div>
        <button class="btn btn-primary" onclick="saveRound()">Save Round</button>
      </div>
    </div>

    <div id="tab-leader" class="hidden">
      <div class="card">
        <label>Filter by Group</label>
        <select id="group-filter" class="form-control" onchange="loadLeaderboard()"></select>
        <div id="lb-list"></div>
      </div>
    </div>

    <div id="tab-manage" class="hidden">
      <div class="card">
        <h3>Groups</h3>
        <input type="text" id="new-group-name" class="form-control" placeholder="Group Name">
        <button class="btn btn-primary" onclick="createGroup()">Create New Group</button>
      </div>
      <div class="card">
        <h3>Courses</h3>
        <input type="text" id="c-name" class="form-control" placeholder="Course Name">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <input type="number" step="0.1" id="c-rating" class="form-control" placeholder="Rating">
          <input type="number" id="c-slope" class="form-control" placeholder="Slope">
        </div>
        <button class="btn btn-primary" onclick="addCourse()">Add Master Course</button>
      </div>
    </div>
  </div>
</div>

<script>
  const S_URL = 'https://vonbibroncsxrgstetow.supabase.co';
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvbmJpYnJvbmNzeHJnc3RldG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MjExMTQsImV4cCI6MjA4NDA5NzExNH0.z0x4uu-34dc2cpWK2CTZSGW9gY2a3pl-t1ANk7gyouk';
  const sb = window.supabase.createClient(S_URL, S_KEY);

  let user = null, courses = [], profile = null;

  async function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) await sb.auth.signUp({ email, password });
  }

  async function startApp(session) {
    user = session.user;
    document.getElementById('view-auth').classList.add('hidden');
    document.getElementById('view-app').classList.remove('hidden');
    document.getElementById('r-date').value = new Date().toISOString().split('T')[0];
    
    // Ensure profile exists
    const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
    if (!p) await sb.from('profiles').insert({ id: user.id, display_name: user.email.split('@')[0] });
    profile = p;

    refreshData();
  }

  async function refreshData() {
    loadDashboard();
    loadCourses();
    loadGroups();
  }

  async function loadDashboard() {
    const { data: p } = await sb.from('profiles').select('*').eq('id', user.id).single();
    document.getElementById('dash-hcp').textContent = p?.handicap_index || '--';
    
    const { data: rounds } = await sb.from('rounds').select('*').eq('user_id', user.id).order('date_played', {ascending: false});
    document.getElementById('recent-list').innerHTML = rounds?.slice(0, 5).map(r => `
      <div class="round-item"><span><b>${r.score}</b> @ ${r.course_name}</span><small>${r.date_played}</small></div>
    `).join('') || 'No rounds.';
  }

  async function loadCourses() {
    const { data } = await sb.from('courses').select('*').order('name');
    courses = data || [];
    const sel = document.getElementById('r-course-select');
    sel.innerHTML = '<option value="">-- Choose Course --</option>';
    courses.forEach(c => sel.innerHTML += `<option value="${c.id}">${c.name}</option>`);
  }

  function autoFillCourse() {
    const c = courses.find(x => x.id === document.getElementById('r-course-select').value);
    if (c) {
      document.getElementById('r-rating').value = c.course_rating;
      document.getElementById('r-slope').value = c.slope_rating;
    }
  }

  async function saveRound() {
    const sel = document.getElementById('r-course-select');
    await sb.from('rounds').insert({
      user_id: user.id,
      course_name: sel.options[sel.selectedIndex].text,
      score: parseInt(document.getElementById('r-score').value),
      course_rating: parseFloat(document.getElementById('r-rating').value),
      slope_rating: parseInt(document.getElementById('r-slope').value),
      date_played: document.getElementById('r-date').value
    });
    alert("Round Saved!"); showTab('dash', document.querySelector('.tab-link')); refreshData();
  }

  async function loadLeaderboard() {
    const gid = document.getElementById('group-filter').value;
    let query = sb.from('profiles').select('*').order('handicap_index', {ascending: true});
    
    if (gid) {
      const { data: members } = await sb.from('group_members').select('user_id').eq('group_id', gid);
      query = query.in('id', members.map(m => m.user_id));
    }

    const { data } = await query;
    document.getElementById('lb-list').innerHTML = data.map((p, i) => `
      <div class="round-item"><span>#${i+1} <b>${p.display_name}</b></span><b>${p.handicap_index || '--'}</b></div>
    `).join('');
  }

  async function loadGroups() {
    const { data } = await sb.from('groups').select('*');
    const sel = document.getElementById('group-filter');
    sel.innerHTML = '<option value="">All Players</option>';
    data?.forEach(g => sel.innerHTML += `<option value="${g.id}">${g.name}</option>`);
  }

  function showTab(name, el) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
    document.getElementById('tab-' + name).classList.remove('hidden');
    document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    if (name === 'leader') loadLeaderboard();
  }

  sb.auth.onAuthStateChange((ev, sess) => { if (sess) startApp(sess); else location.reload(); });
</script>
</body>
</html>
