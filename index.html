<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Pro (WHS Sync)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000;
            --bg: #f4f6f8; --text: #333; --white: #ffffff;
            --danger: #d32f2f; --success: #4CAF50; --info: #0288d1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 15px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* DASHBOARD */
        .dashboard-card {
            background: linear-gradient(135deg, var(--primary), var(--dark));
            color: white; padding: 20px; border-radius: 16px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px;
        }
        .handicap-number { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 5px 0; }
        .handicap-sub { font-size: 0.9rem; opacity: 0.9; }

        /* CARDS */
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 15px; }
        .card-header { font-weight: 700; font-size: 1.1rem; color: var(--dark); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .card-header.with-border { border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 15px; }

        .section-label { font-size: 0.85rem; text-transform: uppercase; color: #777; margin: 20px 0 10px 5px; font-weight: bold; letter-spacing: 1px; }

        /* FORM & INPUTS */
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #555; }
        select, input, textarea { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; background: #fff; font-family: inherit; }

        .course-details-box { background: #e8f5e9; border: 1px solid #c8e6c9; color: var(--dark); padding: 12px; border-radius: 8px; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; }
        .row { display: flex; gap: 15px; }
        .col { flex: 1; }

        /* BUTTONS */
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: var(--info); color: white; margin-top: 10px; }
        .btn-update { background: var(--accent); color: #000; }
        .btn-cancel { background: #9e9e9e; color: white; margin-top: 10px; display: none; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; width: auto; border-radius: 4px; border: 1px solid #ddd; background: white; margin-left: 5px;}
        .btn-del { color: var(--danger); border-color: var(--danger); }

        /* LISTS */
        .score-list { list-style: none; padding: 0; margin: 0; }
        .score-item { background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; }
        .score-top { display: flex; justify-content: space-between; align-items: center; }
        .score-val { font-weight: bold; font-size: 1.1rem; }
        .score-diff { color: #666; font-size: 0.85rem; margin-left: 5px; }
        .hidden { display: none; }
        .arrow { transition: transform 0.3s; font-size: 0.8rem; color: #888; }
        .collapsed .arrow { transform: rotate(-90deg); }
    </style>
</head>
<body>

<div class="container">

    <div class="dashboard-card">
        <div id="pNameDisplay" style="font-weight:bold; margin-bottom:5px;">Golfer</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div class="handicap-sub" id="displayCount">No scores entered</div>
    </div>

    <div class="card">
        <div class="card-header" onclick="toggleSection('syncContent', this)">
            <span>👥 Clubhouse Setup & Sync</span>
            <span class="arrow">▼</span>
        </div>
        <div id="syncContent" class="hidden" style="margin-top:15px;">
            <label>Your Display Name</label>
            <input type="text" id="playerNameInput" placeholder="Enter your name" onchange="saveSyncSettings()">
            <label>Group Secret Key</label>
            <input type="text" id="groupKeyInput" placeholder="Shared with friends" onchange="saveSyncSettings()">
            <button class="btn-sync" id="syncBtn" onclick="syncWithFriends()">🔄 Sync with Clubhouse</button>
        </div>
    </div>

    <div id="clubhouseCard" class="card hidden">
        <div class="card-header"><span>🏆 Friends Leaderboard</span></div>
        <div id="clubhouseList" style="margin-top:15px;"></div>
    </div>

    <div class="card" id="scoreFormCard">
        <div class="card-header with-border"><span>⛳ Post New Score</span></div>
        <input type="hidden" id="editScoreId">
        <label>Select Course</label>
        <select id="courseSelect" onchange="handleCourseSelect()"></select>
        <div id="courseInfoBox" class="course-details-box"></div>
        <div class="row">
            <div class="col"><label>Date</label><input type="date" id="scoreDate"></div>
            <div class="col"><label>Score</label><input type="number" id="scoreVal" placeholder="--" oninput="updateDiffPreview()"></div>
        </div>
        <button id="postBtn" class="btn-primary" onclick="submitScore()">Post Score</button>
        <button id="cancelBtn" class="btn-cancel" onclick="resetForm()">Cancel Edit</button>
    </div>

    <div class="card">
        <div class="card-header collapsed" onclick="toggleSection('historyContent', this)">
            <span>📝 My Score History</span>
            <span class="arrow">▼</span>
        </div>
        <div id="historyContent" class="card-content hidden">
            <ul id="scoreList" class="score-list" style="margin-top:15px;"></ul>
        </div>
    </div>

    <div class="section-label">Management</div>
    <div class="card">
        <div class="card-header collapsed" onclick="toggleSection('courseDbContent', this)">
            <span>⛳ Edit Course Database</span>
            <span class="arrow">▼</span>
        </div>
        <div id="courseDbContent" class="card-content hidden">
            <button class="btn-primary" style="margin-top:15px; margin-bottom:15px;" onclick="openCourseForm()">+ Add New Course</button>
            <div id="courseForm" style="display:none; background:#fafafa; padding:15px; border-radius:8px; margin-bottom:15px; border:1px solid #ddd;">
                <input type="hidden" id="cEditIndex">
                <label>Course Name</label><input type="text" id="cName">
                <label>Tee Color</label><input type="text" id="cTee">
                <div class="row">
                    <div class="col"><label>Rating</label><input type="number" id="cRating" step="0.1"></div>
                    <div class="col"><label>Slope</label><input type="number" id="cSlope"></div>
                </div>
                <button class="btn-primary" onclick="saveCourse()">Save Course</button>
            </div>
            <ul id="courseDbList" class="score-list"></ul>
        </div>
    </div>

</div>

<script>
    // --- DATA INITIALIZATION ---
    const API_BASE = "https://api.jsonstorage.net/v1/json/";
    
    const defaultCourses = [
        {'name': 'Beaver Creek', 'tee': 'Blue', 'slope': 130.0, 'rating': 72.0},
        {'name': 'Santa Maria', 'tee': 'Blue', 'slope': 128.0, 'rating': 71.5},
        {'name': 'The Island', 'tee': 'Blue', 'slope': 135.0, 'rating': 73.1}
    ];

    let courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || defaultCourses;
    let scores = JSON.parse(localStorage.getItem('golfScores_v14')) || [];
    let playerName = localStorage.getItem('golf_pname') || "";
    let groupKey = localStorage.getItem('golf_gkey') || "";

    function init() {
        document.getElementById('scoreDate').valueAsDate = new Date();
        document.getElementById('playerNameInput').value = playerName;
        document.getElementById('groupKeyInput').value = groupKey;
        updateUI();
        if(playerName && groupKey) syncWithFriends();
    }

    function toggleSection(id, header) {
        document.getElementById(id).classList.toggle('hidden');
        if(header) header.classList.toggle('collapsed');
    }

    function saveSyncSettings() {
        playerName = document.getElementById('playerNameInput').value;
        groupKey = document.getElementById('groupKeyInput').value;
        localStorage.setItem('golf_pname', playerName);
        localStorage.setItem('golf_gkey', groupKey);
        updateUI();
    }

    function updateUI() {
        document.getElementById('pNameDisplay').innerText = playerName || "Golfer";
        courses.sort((a, b) => a.name.localeCompare(b.name));
        renderDropdown();
        renderScoreList();
        renderCourseDb();
        calculateHandicap();
    }

    function saveData() {
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        localStorage.setItem('golfScores_v14', JSON.stringify(scores));
        updateUI();
    }

    function calculateHandicap() {
        if (scores.length < 3) {
            document.getElementById('displayIndex').innerText = "--";
            document.getElementById('displayCount').innerText = `Post ${3 - scores.length} more rounds`;
            return;
        }
        let diffs = [...scores].map(r => parseFloat(r.diff)).sort((a,b) => a-b);
        let n = scores.length >= 20 ? 8 : (scores.length >= 15 ? 5 : (scores.length >= 10 ? 3 : 1));
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        document.getElementById('displayIndex').innerText = (Math.floor(avg * 10) / 10).toFixed(1);
        document.getElementById('displayCount').innerText = `${Math.min(scores.length, 20)} rounds used`;
    }

    // --- SCORE ACTIONS ---
    function submitScore() {
        const editId = document.getElementById('editScoreId').value;
        const idx = document.getElementById('courseSelect').value;
        const date = document.getElementById('scoreDate').value;
        const val = parseFloat(document.getElementById('scoreVal').value);
        if (idx === "" || !date || !val) { alert("Please complete form"); return; }
        const c = courses[idx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        const entry = { id: editId ? parseInt(editId) : Date.now(), date, courseName: c.name, tee: c.tee, rating: c.rating, slope: c.slope, score: val, diff };
        
        if (editId) {
            const i = scores.findIndex(s => s.id == editId);
            if (i > -1) scores[i] = entry;
        } else {
            scores.unshift(entry);
        }
        resetForm();
        saveData();
        if(playerName && groupKey) syncWithFriends();
    }

    function resetForm() {
        document.getElementById('editScoreId').value = "";
        document.getElementById('scoreVal').value = "";
        document.getElementById('courseSelect').value = "";
        document.getElementById('courseInfoBox').style.display = "none";
        document.getElementById('postBtn').innerText = "Post Score";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function deleteScore(id) {
        if(confirm("Delete round?")) { scores = scores.filter(s => s.id !== id); saveData(); syncWithFriends(); }
    }

    // --- SYNC LOGIC ---
    async function syncWithFriends() {
        if(!playerName || !groupKey) return alert("Enter Name and Group Key to sync!");
        const binId = btoa(groupKey).replace(/=/g, "");
        const btn = document.getElementById('syncBtn');
        btn.innerText = "Syncing...";

        try {
            const res = await fetch(`${API_BASE}${binId}`);
            let cloudData = res.ok ? await res.json() : { players: {}, sharedCourses: [] };

            // 1. Upload my data
            cloudData.players[playerName] = {
                index: document.getElementById('displayIndex').innerText,
                history: scores.slice(0, 20),
                updated: new Date().toLocaleTimeString()
            };

            // 2. Merge Courses (Shared Database)
            let courseMap = new Map();
            [...cloudData.sharedCourses, ...courses].forEach(c => courseMap.set(`${c.name}-${c.tee}`, c));
            cloudData.sharedCourses = Array.from(courseMap.values());
            courses = cloudData.sharedCourses;

            // 3. Save to Cloud
            await fetch(`${API_BASE}${binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cloudData)
            });

            renderClubhouse(cloudData.players);
            saveData();
        } catch (e) { console.error(e); }
        btn.innerText = "🔄 Sync with Clubhouse";
    }

    function renderClubhouse(players) {
        const list = document.getElementById('clubhouseList');
        document.getElementById('clubhouseCard').classList.remove('hidden');
        list.innerHTML = "";
        for (let name in players) {
            if (name === playerName) continue;
            const p = players[name];
            const div = document.createElement('div');
            div.className = "score-item";
            div.innerHTML = `
                <div class="card-header" onclick="toggleSection('friend_${name}')">
                    <span>👤 ${name} <strong>(${p.index})</strong></span>
                    <span class="arrow">▼</span>
                </div>
                <div id="friend_${name}" class="hidden" style="margin-top:10px">
                    ${p.history.map(s => `<div style="font-size:0.8rem; border-bottom:1px solid #eee; padding:5px 0;">${s.date}: <strong>${s.score}</strong> (${s.courseName})</div>`).join('')}
                </div>`;
            list.appendChild(div);
        }
    }

    // --- ORIGINAL MANAGEMENT FUNCTIONS ---
    function renderDropdown() {
        const sel = document.getElementById('courseSelect');
        const curr = sel.value;
        sel.innerHTML = '<option value="">-- Choose Course --</option>';
        courses.forEach((c, i) => {
            const opt = document.createElement('option');
            opt.value = i; opt.innerText = `${c.name} (${c.tee})`;
            sel.appendChild(opt);
        });
        sel.value = curr;
    }

    function handleCourseSelect() {
        const idx = document.getElementById('courseSelect').value;
        const box = document.getElementById('courseInfoBox');
        if (idx === "") box.style.display = "none";
        else {
            const c = courses[idx];
            box.innerHTML = `${c.tee} Tees | Rating: ${c.rating} | Slope: ${c.slope}`;
            box.style.display = "block";
        }
    }

    function renderScoreList() {
        const list = document.getElementById('scoreList');
        list.innerHTML = "";
        scores.forEach(s => {
            const li = document.createElement('li');
            li.className = "score-item";
            li.innerHTML = `<div class="score-top"><div><small>${s.date}</small><br><strong>${s.courseName}</strong></div>
                <div style="text-align:right"><span class="score-val">${s.score}</span><br><span class="score-diff">Diff: ${s.diff}</span></div></div>
                <div style="text-align:right; margin-top:5px;"><button class="btn-sm btn-del" onclick="deleteScore(${s.id})">Del</button></div>`;
            list.appendChild(li);
        });
    }

    function renderCourseDb() {
        const list = document.getElementById('courseDbList');
        list.innerHTML = "";
        courses.forEach((c, i) => {
            const li = document.createElement('li');
            li.className = "score-item";
            li.innerHTML = `<div class="score-top"><div><strong>${c.name}</strong> (${c.tee})</div>
                <button class="btn-sm btn-del" onclick="deleteCourse(${i})">Del</button></div>`;
            list.appendChild(li);
        });
    }

    function openCourseForm() { document.getElementById('courseForm').style.display = 'block'; }
    function saveCourse() {
        const name = document.getElementById('cName').value, tee = document.getElementById('cTee').value;
        const rating = parseFloat(document.getElementById('cRating').value), slope = parseFloat(document.getElementById('cSlope').value);
        if(!name || !rating) return alert("Fill fields");
        courses.push({ name, tee, rating, slope });
        document.getElementById('courseForm').style.display = 'none';
        saveData();
    }
    function deleteCourse(i) { if(confirm("Delete course?")) { courses.splice(i, 1); saveData(); } }

    init();
</script>
</body>
</html>
