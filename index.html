<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Pro (Shared)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000;
            --bg: #f4f6f8; --text: #333; --white: #ffffff;
            --danger: #d32f2f; --success: #4CAF50;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .dashboard-card { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .handicap-number { font-size: 3.5rem; font-weight: 800; margin: 5px 0; }
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 15px; }
        .card-header { font-weight: 700; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .section-label { font-size: 0.85rem; text-transform: uppercase; color: #777; margin: 20px 0 10px 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: #0288d1; color: white; }
        .btn-del { background: none; color: var(--danger); font-size: 0.8rem; width: auto; padding: 5px; margin: 0; }
        .score-item { background: #f9f9f9; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #eee; list-style: none; }
        .hidden { display: none; }
        .clubhouse-tag { background: #e8f5e9; color: var(--dark); padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <label>Your Name</label>
        <input type="text" id="playerName" placeholder="Your Name" onchange="saveSettings()">
        <label>Group Key</label>
        <input type="text" id="groupKey" placeholder="e.g., SundayGolfers" onchange="saveSettings()">
        <button class="btn-sync" id="syncBtn" onclick="syncData()">🔄 Sync with Friends</button>
    </div>

    <div class="dashboard-card">
        <div id="playerDisplayName" style="font-size: 1.2rem; font-weight: bold; margin-bottom: 5px;">Player</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">CURRENT INDEX</div>
    </div>

    <div id="clubhouseSection" class="hidden">
        <div class="section-label">Clubhouse (Friends)</div>
        <div id="clubhouseList"></div>
    </div>

    <div class="section-label">My Actions</div>
    <div class="card">
        <div class="card-header" onclick="toggleSection('postForm')"><span>⛳ Post New Score</span><span>▼</span></div>
        <div id="postForm" class="hidden" style="margin-top:15px;">
            <select id="courseSelect"></select>
            <input type="date" id="scoreDate">
            <input type="number" id="scoreVal" placeholder="Gross Score">
            <button class="btn-primary" onclick="submitScore()">Post Score</button>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><span>📝 My Score History</span></div>
        <div id="myHistory" style="margin-top:15px;">
            <ul id="scoreList" style="padding:0"></ul>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://api.jsonstorage.net/v1/json/";

    // --- DEEP SCAN RECOVERY ---
    function deepScanRecover() {
        const scoreKeys = ['golfScores_v14', 'golf_scores', 'golfScores'];
        const courseKeys = ['golfCourses_v14', 'golf_courses_custom', 'golfCourses'];
        
        let foundScores = [];
        let foundCourses = [];

        scoreKeys.forEach(k => {
            const data = localStorage.getItem(k);
            if(data) {
                const parsed = JSON.parse(data);
                if(Array.isArray(parsed) && parsed.length > foundScores.length) foundScores = parsed;
            }
        });

        courseKeys.forEach(k => {
            const data = localStorage.getItem(k);
            if(data) {
                const parsed = JSON.parse(data);
                if(Array.isArray(parsed) && parsed.length > foundCourses.length) foundCourses = parsed;
            }
        });

        if(foundScores.length > 0) localStorage.setItem('main_scores', JSON.stringify(foundScores));
        if(foundCourses.length > 0) localStorage.setItem('main_courses', JSON.stringify(foundCourses));
    }
    deepScanRecover();

    let playerName = localStorage.getItem('golf_player_name') || "";
    let groupKey = localStorage.getItem('golf_group_key') || "";
    let scores = JSON.parse(localStorage.getItem('main_scores')) || [];
    
    const defaultCourses = [
        {'name': 'Beaver Creek', 'tee': 'Blue', 'slope': 130.0, 'rating': 72.0},
        {'name': 'Belle Terre', 'tee': 'Blue', 'slope': 131.0, 'rating': 72.2},
        {'name': 'Cam2', 'tee': 'White', 'slope': 118.0, 'rating': 67.7},
        {'name': 'Carter Plantation', 'tee': 'Blue', 'slope': 115.0, 'rating': 66.7},
        {'name': 'Carter Plantation', 'tee': 'Blue/Gold', 'slope': 126.0, 'rating': 69.7},
        {'name': 'Carter Plantation', 'tee': 'Gold', 'slope': 128.0, 'rating': 70.9},
        {'name': 'City Park', 'tee': 'Blue', 'slope': 125.0, 'rating': 70.0},
        {'name': 'Coppermill', 'tee': 'Gold', 'slope': 129.0, 'rating': 71.8},
        {'name': 'Covington County Club', 'tee': 'Blue', 'slope': 127.0, 'rating': 71.9},
        {'name': 'Fenwood', 'tee': 'White/Blue', 'slope': 127.5, 'rating': 71.0},
        {'name': 'Greystone', 'tee': 'Blue', 'slope': 128.0, 'rating': 70.8},
        {'name': 'Greystone', 'tee': 'Gold', 'slope': 132.0, 'rating': 72.5},
        {'name': 'JS Clark', 'tee': 'White', 'slope': 120.0, 'rating': 68.5},
        {'name': 'Oak Knoll', 'tee': 'White', 'slope': 124.0, 'rating': 70.1},
        {'name': 'Oak Lake', 'tee': 'White/Blue', 'slope': 122.0, 'rating': 69.8},
        {'name': 'Pelican Point', 'tee': 'Gold', 'slope': 124.0, 'rating': 70.0},
        {'name': 'Pelican Point', 'tee': 'White', 'slope': 116.0, 'rating': 68.5},
        {'name': 'Santa Maria', 'tee': 'Blue', 'slope': 128.0, 'rating': 71.5},
        {'name': 'Santa Maria', 'tee': 'White', 'slope': 118.0, 'rating': 65},
        {'name': 'The Island (Plaquemine)', 'tee': 'Blue', 'slope': 135.0, 'rating': 73.1},
        {'name': 'The Island (Plaquemine)', 'tee': 'Gold', 'slope': 130.0, 'rating': 71.8},
        {'name': 'The Island (Plaquemine)', 'tee': 'White', 'slope': 130.0, 'rating': 71.3},
        {'name': 'The Pines', 'tee': 'White/Blue', 'slope': 125.0, 'rating': 70.5},
        {'name': 'Webb', 'tee': 'White', 'slope': 123.0, 'rating': 69.5}
    ];
    let customCourses = JSON.parse(localStorage.getItem('main_courses')) || [];
    let courses = customCourses.length > 0 ? customCourses : defaultCourses;

    function init() {
        document.getElementById('playerName').value = playerName;
        document.getElementById('groupKey').value = groupKey;
        document.getElementById('scoreDate').valueAsDate = new Date();
        renderCourses();
        updateUI();
        if(groupKey && playerName) syncData();
    }

    function toggleSection(id) { document.getElementById(id).classList.toggle('hidden'); }

    function saveSettings() {
        playerName = document.getElementById('playerName').value;
        groupKey = document.getElementById('groupKey').value;
        localStorage.setItem('golf_player_name', playerName);
        localStorage.setItem('golf_group_key', groupKey);
        updateUI();
    }

    function renderCourses() {
        const sel = document.getElementById('courseSelect');
        sel.innerHTML = "";
        courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, i) => {
            sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
        });
    }

    function calculateIndex(scoreArr) {
        if (scoreArr.length < 3) return "--";
        let diffs = [...scoreArr].map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = scoreArr.length >= 20 ? 8 : Math.ceil(scoreArr.length / 3);
        let avg = diffs.slice(0, n).reduce((a,b) => a+b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function updateUI() {
        document.getElementById('displayIndex').innerText = calculateIndex(scores);
        document.getElementById('playerDisplayName').innerText = playerName || "Player";
        const list = document.getElementById('scoreList');
        list.innerHTML = "";
        scores.forEach((s, i) => {
            list.innerHTML += `<li class="score-item">
                <div style="display:flex; justify-content:space
