<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cloud Master Recovery</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); padding: 15px; }
        .dashboard { background: #333; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 5px solid #2196f3; }
        .card { background: white; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ccc; padding: 15px; }
        button { width: 100%; padding: 15px; background: #2196f3; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .cloud-item { background: #e3f2fd; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; border-left: 5px solid #1976D2; }
        label { font-weight: bold; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="font-size: 1.2rem; font-weight: bold;">CLOUD RECOVERY CONSOLE</div>
    <div id="status">Ready to Connect</div>
</div>

<div class="card">
    <label>1. ENTER YOUR SECRET KEY</label>
    <input type="text" id="keyIn" value="Masters2026" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
    <button onclick="fetchEverything()" style="margin-top:10px;">📡 PULL ALL CLOUD DATA</button>
</div>

<div class="card" id="displayArea" style="display:none;">
    <label>2. SELECT PLAYER TO RESTORE</label>
    <div id="playerButtons"></div>
    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
    <label>3. COURSES FOUND IN CLOUD</label>
    <div id="coursePreview"></div>
</div>

<script>
    let globalCloud = null;

    async function fetchEverything() {
        const key = document.getElementById('keyIn').value;
        const binId = btoa(key).replace(/=/g, "");
        const status = document.getElementById('status');
        status.innerText = "Connecting to bin: " + binId;

        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            if (!res.ok) throw new Error("Bin empty");
            
            globalCloud = await res.json();
            document.getElementById('displayArea').style.display = "block";
            status.innerText = "✅ DATA RETRIEVED";
            
            // Show Players
            let pDiv = document.getElementById('playerButtons');
            pDiv.innerHTML = "";
            Object.keys(globalCloud.players).forEach(name => {
                pDiv.innerHTML += `<button onclick="restorePlayer('${name}')" style="background:#2E7D32; margin-bottom:10px;">Restore ${name}'s Scores</button>`;
            });

            // Show Courses
            let cDiv = document.getElementById('coursePreview');
            cDiv.innerHTML = globalCloud.courses.map(c => `
                <div class="cloud-item">
                    <b>${c.name}</b> (${c.tee})<br>
                    Rating: ${c.rating} | Slope: ${c.slope}
                </div>
            `).join('');

        } catch (e) {
            status.innerText = "❌ CLOUD EMPTY FOR THIS KEY";
            alert("Nothing found for: " + key);
        }
    }

    function restorePlayer(name) {
        // Save Courses
        localStorage.setItem('golfCourses_v14', JSON.stringify(globalCloud.courses));
        // Save Scores
        localStorage.setItem('scores_' + name, JSON.stringify(globalCloud.players[name].history));
        localStorage.setItem('golf_pname', name);
        localStorage.setItem('knownUsers', JSON.stringify(Object.keys(globalCloud.players)));
        
        alert("Restored " + name + " and all courses! Refreshing...");
        location.reload();
    }
</script>
</body>
</html>
