<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Commissioner</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 4px solid var(--accent); }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; min-height: 4rem; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        .header { background: #eee; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .content { padding: 15px; display: none; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; list-style: none; }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 4px; margin-right: 4px; }
        .user-pill { display: inline-block; padding: 8px 12px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 20px; margin: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .user-pill:hover { background: var(--primary); color: white; }
        .active-pill { background: var(--dark); color: white; border-color: var(--dark); }
        .tee-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: #333; color: #fff; margin-left: 5px; vertical-align: middle; text-transform: uppercase; }
        .lock-notice { background: #fff3e0; padding: 10px; border-radius: 8px; border: 1px solid #ffe0b2; font-size: 0.8rem; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp" style="font-size: 1.2rem; font-weight: bold;">Select User</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.9; letter-spacing: 1px;">WHS HANDICAP INDEX</div>
</div>

<div class="card">
    <div class="header" onclick="menuToggle('sync')"><span>👥 Switch Golfer & Sync</span><span>▼</span></div>
    <div id="sync" class="content">
        <label>Quick Switch Profile:</label>
        <div id="userList" style="margin-bottom:15px;"></div>
        
        <div style="display:flex; gap:5px;">
            <input type="text" id="nameIn" placeholder="New Name" style="margin-bottom:0;">
            <button onclick="performSwitch()" style="width:auto; margin-bottom:0; background:var(--dark);">Load</button>
        </div>
        
        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
        
        <label>Access Key / Admin Pass</label>
        <input type="password" id="keyIn" placeholder="Enter Key to See Group">
        <button onclick="sync()">☁️ Sync & View Clubhouse</button>
        
        <div id="lockMsg" class="lock-notice">Enter key and Sync to unlock Clubhouse list.</div>
        <div id="cbList" style="margin-top:10px;"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="menuToggle('post')"><span>⛳ Post New Score</span><span>▼</span></div>
    <div id="post" class="content">
        <label>Course</label><select id="cSel"></select>
        <label>Date</label><input type="date" id="dIn">
        <label>Gross Score</label><input type="number" id="sIn" placeholder="--">
        <button onclick="addS()">Save Round</button>
    </div>
</div>

<div class="card">
    <div class="header" onclick="menuToggle('hist')"><span>📝 Score History</span><span>▼</span></div>
    <div id="hist" class="content"><div id="sList"></div></div>
</div>

<div class="card">
    <div class="header" onclick="menuToggle('course')"><span>⛳ Manage Courses</span><span>▼</span></div>
    <div id="course" class="content">
        <button onclick="menuToggle('nc')">+ Add New Course/Tee</button>
        <div id="nc" class="content" style="border:1px dashed #ccc; padding:10px; margin: 10px 0;">
            <label>Course Name</label><input type="text" id="ncN">
            <label>Tee Color</label><input type="text" id="ncT">
            <div style="display:flex; gap:10px;">
                <div style="flex:1;"><label>Rating</label><input type="number" id="ncR" step="0.1"></div>
                <div style="flex:1;"><label>Slope</label><input type="number" id="ncS"></div>
            </div>
            <button onclick="addC()">Save Course</button>
        </div>
        <div id="cList"></div>
    </div>
</div>

<script>
    function menuToggle(id) {
        var x = document.getElementById(id);
        if (x) x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    const MASTER_KEY = "Masters2026";
    const ADMIN_PASS = "golf2026";
    
    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    var pName = localStorage.getItem('golf_pname') || "";
    var gKey = ""; // Key is now volatile - wiped on refresh
    var scores = [];
    var knownUsers = JSON.parse(localStorage.getItem('knownUsers')) || [];
    var isAdmin = false;

    function performSwitch(manualName = null) {
        if(pName && scores.length) localStorage.setItem('scores_' + pName.trim(), JSON.stringify(scores));
        pName = manualName || document.getElementById('nameIn').value.trim();
        if(!pName) return;
        localStorage.setItem('golf_pname', pName);
        if(!knownUsers.includes(pName)) {
            knownUsers.push(pName);
            localStorage.setItem('knownUsers', JSON.stringify(knownUsers));
        }
        loadScores();
        render();
    }

    function loadScores() {
        let saved = localStorage.getItem('scores_' + pName.trim());
        scores = saved ? JSON.parse(saved) : [];
    }

    function calc() {
        if (!scores || scores.length < 3) return "--";
        let diffs = [...scores].map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = scores.length >= 20 ? 8 : (scores.length >= 10 ? 3 : 1);
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function render() {
        document.getElementById('idx').innerText = calc();
        document.getElementById('pDisp').innerHTML = pName + (isAdmin ? ' <span style="background:black; color:white; font-size:10px; padding:2px 5px; border-radius:3px;">COMMISSIONER</span>' : '');
        document.getElementById('nameIn').value = pName;
        
        var uL = document.getElementById('userList');
        uL.innerHTML = "";
        knownUsers.sort().forEach(u => {
            let active = (u === pName) ? "active-pill" : "";
            uL.innerHTML += `<span class="user-pill ${active}" onclick="performSwitch('${u}')">${u}</span>`;
        });

        var sel = document.getElementById('cSel');
        sel.innerHTML = '<option value="">-- Choose Course --</option>';
        courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, i) => {
            sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
        });

        var sl = document.getElementById('sList');
        sl.innerHTML = scores.length ? "" : "<small>No scores found.</small>";
        scores.forEach((s, i) => {
            sl.innerHTML += `<div class="score-item">
                <div style="display:flex; justify-content:space-between;">
                    <div><b>${s.score}</b> at ${s.courseName||s.course} <span class="tee-badge">${s.teeColor||''}</span><br><small>${s.date}</small></div>
                    <div style="text-align:right"><small>Diff: ${s.diff}</small></div>
                </div>
                <div style="text-align:right; margin-top:5px;">
                    <button class="btn-outline" onclick="menuToggle('ed-s-${i}')">Edit</button>
                    <button class="btn-outline" style="color:red" onclick="delS(${i})">Del</button>
                </div>
                <div id="ed-s-${i}" class="edit-drawer">
                    <input type="number" id="ev-${i}" value="${s.score}"><button onclick="updateS(${i})">Save</button>
                </div>
            </div>`;
        });

        var cl = document.getElementById('cList');
        cl.innerHTML = "";
        courses.forEach((c, i) => {
            cl.innerHTML += `<div class="score-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${c.name}</b> (${c.tee})<br><small>R: ${c.rating} S: ${c.slope}</small></div>
                    <div>
                        <button class="btn-outline" onclick="menuToggle('ed-c-${i}')">Edit</button>
                        <button class="btn-outline" style="color:red" onclick="delC(${i})">Del</button>
                    </div>
                </div>
                <div id="ed-c-${i}" class="edit-drawer">
                    <input type="number" id="er-${i}" value="${c.rating}" step="0.1"><input type="number" id="es-${i}" value="${c.slope}">
                    <button onclick="updateC(${i})">Save</button>
                </div>
            </div>`;
        });
    }

    async function sync() {
        let inputKey = document.getElementById('keyIn').value;
        if(!inputKey) return alert("You must enter a Group Key to sync.");

        // SECURITY LOGIC
        isAdmin = (inputKey === ADMIN_PASS);
        gKey = isAdmin ? MASTER_KEY : inputKey;
        
        const binId = btoa(gKey).replace(/=/g, "");
        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            
            // Upload current player data
            cloud.players[pName] = { index: calc(), history: scores.slice(0, 10) };
            
            // Update cloud
            await fetch("https://api.jsonstorage.net/v1/json/" + binId, { 
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(cloud) 
            });

            document.getElementById('lockMsg').style.display = "none";
            renderClubhouse(cloud);
            render(); // Update Dashboard
            alert("Sync Complete! Clubhouse Unlocked.");
        } catch (e) { alert("Sync Error - check your internet/key"); }
    }

    function renderClubhouse(cloud) {
        var list = document.getElementById('cbList');
        list.innerHTML = "";
        for (var name in cloud.players) {
            if (name === pName) continue;
            var p = cloud.players[name];
            list.innerHTML += `<div class="score-item">👤 <b>${name}</b>: ${p.index} 
            <button class="btn-outline" onclick="menuToggle('f-hist-${name}')">History</button>
            <div id="f-hist-${name}" class="edit-drawer">
            ${p.history.map((s, idx) => `<div style="font-size:0.75rem; border-bottom:1px solid #eee; padding:5px 0;">${s.date}: ${s.score} ${isAdmin ? `<button style="color:red; background:none; border:none; font-size:0.6rem;" onclick="adminDel('${name}',${idx})">DEL</button>` : ''}</div>`).join('')}
            </div></div>`;
        }
    }

    function addS() {
        var cIdx = document.getElementById('cSel').value;
        var val = parseFloat(document.getElementById('sIn').value);
        if(!pName || cIdx === "" || isNaN(val)) return alert("Check Name, Course and Score");
        var c = courses[cIdx];
        var d = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('dIn').value, courseName: c.name, teeColor: c.tee, score: val, diff: d });
        localStorage.setItem('scores_' + pName.trim(), JSON.stringify(scores));
        render();
    }

    function updateS(i) {
        var newVal = parseFloat(document.getElementById('ev-'+i).value);
        let s = scores[i];
        var c = courses.find(x => x.name === s.courseName && x.tee === s.teeColor);
        if(c && !isNaN(newVal)) {
            scores[i].score = newVal;
            scores[i].diff = ((newVal - c.rating) * 113 / c.slope).toFixed(1);
            localStorage.setItem('scores_' + pName.trim(), JSON.stringify(scores));
            render();
        }
    }

    function addC() {
        var n = document.getElementById('ncN').value; var t = document.getElementById('ncT').value;
        var r = parseFloat(document.getElementById('ncR').value); var s = parseInt(document.getElementById('ncS').value);
        courses.push({ name: n, tee: t, rating: r, slope: s });
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        render();
    }

    function updateC(i) {
        courses[i].rating = parseFloat(document.getElementById('er-' + i).value);
        courses[i].slope = parseInt(document.getElementById('es-' + i).value);
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        render();
    }

    function delS(i) { if(confirm("Delete?")) { scores.splice(i, 1); localStorage.setItem('scores_' + pName.trim(), JSON.stringify(scores)); render(); } }
    function delC(i) { if(confirm("Delete?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render(); } }

    async function adminDel(target, idx) {
        if(!confirm("Delete friend's score from cloud?")) return;
        const binId = btoa(gKey).replace(/=/g, "");
        const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
        let cloud = await res.json();
        cloud.players[target].history.splice(idx, 1);
        await fetch("https://api.jsonstorage.net/v1/json/" + binId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cloud) });
        sync();
    }

    // Initialize
    document.getElementById('dIn').valueAsDate = new Date();
    loadScores();
    render();
</script>
</body>
</html>
