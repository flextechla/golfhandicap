<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Commissioner</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; }
        body { font-family: sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .handicap { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        .header { background: #eee; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .content { padding: 15px; display: none; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; list-style: none; }
        .admin-tag { background: #000; color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
        .btn-red { background: #d32f2f; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; width: auto; padding: 5px 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp">Golfer</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.8;">WHS HANDICAP INDEX</div>
</div>

<div class="card">
    <div class="header" onclick="toggle('sync')"><span>👥 Clubhouse Sync</span><span>▼</span></div>
    <div id="sync" class="content">
        <label>Your Name</label><input type="text" id="nameIn" onchange="saveSet()">
        <label>Group Secret Key</label><input type="text" id="keyIn" onchange="saveSet()">
        <button onclick="sync()">Sync Now</button>
        <div id="cbList" style="margin-top:10px;"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('post')"><span>⛳ Post New Score</span><span>▼</span></div>
    <div id="post" class="content">
        <label>Course</label><select id="cSel"></select>
        <label>Date</label><input type="date" id="dIn">
        <label>Gross Score</label><input type="number" id="sIn" placeholder="--">
        <button onclick="addS()">Save Round</button>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('hist')"><span>📝 Score History</span><span>▼</span></div>
    <div id="hist" class="content">
        <div id="sList"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('course')"><span>⛳ Manage Courses</span><span>▼</span></div>
    <div id="course" class="content">
        <button onclick="toggle('nc')">+ Add New Course</button>
        <div id="nc" style="display:none; border:1px dashed #ccc; padding:10px; margin: 10px 0;">
            <label>Name</label><input type="text" id="ncN">
            <label>Tee</label><input type="text" id="ncT">
            <label>Rating</label><input type="number" id="ncR" step="0.1">
            <label>Slope</label><input type="number" id="ncS">
            <button onclick="addC()">Save Course</button>
        </div>
        <div id="cList"></div>
    </div>
</div>

<script>
    const ADMIN_NAME = "Admin";

    function toggle(id) {
        var x = document.getElementById(id);
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    var scores = JSON.parse(localStorage.getItem('golfScores_v14')) || [];
    var pName = localStorage.getItem('golf_pname') || "";
    var gKey = localStorage.getItem('golf_gkey') || "";

    function saveSet() {
        pName = document.getElementById('nameIn').value;
        gKey = document.getElementById('keyIn').value;
        localStorage.setItem('golf_pname', pName);
        localStorage.setItem('golf_gkey', gKey);
        render();
    }

    function render() {
        document.getElementById('pDisp').innerHTML = pName + (pName === ADMIN_NAME ? '<span class="admin-tag">ADMIN</span>' : '');
        
        var sel = document.getElementById('cSel');
        sel.innerHTML = '<option value="">-- Choose Course --</option>';
        courses.forEach((c, i) => {
            sel.innerHTML += '<option value="'+i+'">'+c.name+' ('+c.tee+')</option>';
        });

        var sl = document.getElementById('sList');
        sl.innerHTML = "";
        scores.forEach((s, i) => {
            sl.innerHTML += '<div class="score-item"><b>'+s.score+'</b> at '+s.courseName+'<br><small>'+s.date+' (Diff: '+s.diff+')</small>' +
                '<div style="text-align:right; margin-top:5px;">' +
                '<button class="btn-outline" onclick="editS('+i+')">Edit</button>' +
                '<button class="btn-outline" style="color:red" onclick="delS('+i+')">Del</button>' +
                '</div></div>';
        });

        var cl = document.getElementById('cList');
        cl.innerHTML = "";
        courses.forEach((c, i) => {
            cl.innerHTML += '<div class="score-item"><b>'+c.name+'</b> ('+c.tee+')<br><small>R: '+c.rating+' S: '+c.slope+'</small>' +
                '<div style="text-align:right; margin-top:5px;">' +
                '<button class="btn-outline" onclick="editC('+i+')">Edit</button>' +
                '<button class="btn-outline" style="color:red" onclick="delC('+i+')">Del</button>' +
                '</div></div>';
        });
        calc();
    }

    function calc() {
        if (scores.length < 3) return document.getElementById('idx').innerText = "--";
        var diffs = scores.map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        var n = scores.length >= 20 ? 8 : (scores.length >= 10 ? 3 : 1);
        var avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        document.getElementById('idx').innerText = (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function addS() {
        var cIdx = document.getElementById('cSel').value;
        var val = parseFloat(document.getElementById('sIn').value);
        if(cIdx === "" || isNaN(val)) return alert("Select course and score");
        var c = courses[cIdx];
        var d = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('dIn').value, courseName: c.name, score: val, diff: d });
        localStorage.setItem('golfScores_v14', JSON.stringify(scores));
        document.getElementById('sIn').value = "";
        render();
    }

    function editS(i) {
        var n = prompt("Enter new score:", scores[i].score);
        if(n) {
            scores[i].score = parseFloat(n);
            var c = courses.find(x => x.name === scores[i].courseName);
            if(c) scores[i].diff = ((scores[i].score - c.rating) * 113 / c.slope).toFixed(1);
            localStorage.setItem('golfScores_v14', JSON.stringify(scores));
            render();
        }
    }

    function addC() {
        var n = document.getElementById('ncN').value;
        var r = parseFloat(document.getElementById('ncR').value);
        var s = parseInt(document.getElementById('ncS').value);
        courses.push({ name: n, tee: document.getElementById('ncT').value, rating: r, slope: s });
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        document.getElementById('ncN').value = "";
        toggle('nc');
        render();
    }

    function editC(i) {
        var r = prompt("New Rating:", courses[i].rating);
        var s = prompt("New Slope:", courses[i].slope);
        if(r && s) {
            courses[i].rating = parseFloat(r);
            courses[i].slope = parseInt(s);
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
            render();
        }
    }

    function delS(i) { if(confirm("Delete round?")) { scores.splice(i, 1); localStorage.setItem('golfScores_v14', JSON.stringify(scores)); render(); } }
    function delC(i) { if(confirm("Delete course?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render(); } }

    async function sync() {
        if(!pName || !gKey) return alert("Enter Name/Key");
        const binId = btoa(gKey).replace(/=/g, "");
        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            cloud.players[pName] = { index: document.getElementById('idx').innerText, history: scores.slice(0, 10) };
            await fetch("https://api.jsonstorage.net/v1/json/" + binId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cloud)
            });
            renderClubhouse(cloud.players);
            alert("Clubhouse Updated!");
        } catch (e) { alert("Sync Error"); }
    }

    function renderClubhouse(players) {
        var list = document.getElementById('cbList');
        list.innerHTML = "";
        for (var name in players) {
            if (name === pName) continue;
            list.innerHTML += '<div class="score-item">👤 <b>'+name+'</b>: '+players[name].index + 
            (pName === ADMIN_NAME ? ' <button class="btn-outline" style="color:red" onclick="adminDel(\''+name+'\')">Delete Friend</button>' : '') + '</div>';
        }
    }

    document.getElementById('dIn').valueAsDate = new Date();
    document.getElementById('nameIn').value = pName;
    document.getElementById('keyIn').value = gKey;
    render();
</script>
</body>
</html>
