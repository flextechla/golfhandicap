<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Commissioner</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 4px solid var(--accent); }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        .header { background: #eee; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .content { padding: 15px; display: none; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #444; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; list-style: none; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; width: auto; padding: 6px 12px; font-size: 0.75rem; border-radius: 4px; }
        .restore-btn { background: #0288d1; font-size: 0.8rem; padding: 8px; margin-bottom: 15px; }
        .switch-area { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp" style="font-size: 1.2rem; font-weight: bold;">Golfer</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.9; letter-spacing: 1px;">HANDICAP INDEX</div>
</div>

<div class="card">
    <div class="header" onclick="secToggle('sync')"><span>👥 Clubhouse & User Switch</span><span>▼</span></div>
    <div id="sync" class="content">
        <div class="switch-area">
            <label>Profile Name</label>
            <input type="text" id="nameIn" placeholder="Ex: Mike">
            <button onclick="performSwitch()" style="background:var(--dark);">🔄 Load Profile</button>
        </div>
        <label>Group Key (Masters2026)</label>
        <input type="password" id="keyIn" placeholder="Enter Key">
        <button onclick="sync()">☁️ Sync to Cloud</button>
        <button class="restore-btn" onclick="restoreFromCloud()">📥 Restore Scores from Cloud</button>
        <div id="cbList" style="margin-top:10px;"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="secToggle('post')"><span>⛳ Post New Score</span><span>▼</span></div>
    <div id="post" class="content">
        <label>Course</label><select id="cSel"></select>
        <label>Date</label><input type="date" id="dIn">
        <label>Gross Score</label><input type="number" id="sIn">
        <button onclick="addS()">Save Round</button>
    </div>
</div>

<div class="card">
    <div class="header" onclick="secToggle('hist')"><span>📝 Score History</span><span>▼</span></div>
    <div id="hist" class="content">
        <div id="sList"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="secToggle('course')"><span>⛳ Manage Courses</span><span>▼</span></div>
    <div id="course" class="content">
        <button onclick="secToggle('nc')">+ Add New Course</button>
        <div id="nc" class="content" style="border:1px dashed #ccc; margin-top:10px;">
            <label>Name</label><input type="text" id="ncN">
            <label>Tee</label><input type="text" id="ncT">
            <label>Rating</label><input type="number" id="ncR" step="0.1">
            <label>Slope</label><input type="number" id="ncS">
            <button onclick="addC()">Save Course</button>
        </div>
        <div id="cList"></div>
    </div>
</div>

<script>
    function secToggle(id) {
        var x = document.getElementById(id);
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    const MASTER_KEY = "Masters2026";
    const ADMIN_PASS = "golf2026";
    let isAdmin = false;

    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    var pName = localStorage.getItem('golf_pname') || "";
    var gKey = localStorage.getItem('golf_gkey') || "";
    var scores = [];

    function performSwitch() {
        if(pName && scores.length) localStorage.setItem('scores_' + pName.trim(), JSON.stringify(scores));
        pName = document.getElementById('nameIn').value.trim();
        let inputKey = document.getElementById('keyIn').value;
        isAdmin = (inputKey === ADMIN_PASS);
        gKey = isAdmin ? MASTER_KEY : (inputKey || MASTER_KEY);
        localStorage.setItem('golf_pname', pName);
        localStorage.setItem('golf_gkey', gKey);
        loadScores();
        render();
    }

    function loadScores() {
        let saved = localStorage.getItem('scores_' + pName.trim());
        scores = saved ? JSON.parse(saved) : [];
    }
