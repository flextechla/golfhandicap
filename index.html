<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Master</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000; --bg: #f4f6f8; --text: #333; --white: #ffffff; --danger: #d32f2f; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        .container { max-width: 600px; margin: 0 auto; }
        
        /* Cards & UI */
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; margin-bottom: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 15px; }
        .handicap-number { font-size: 3.5rem; font-weight: 800; margin: 0; }
        
        h3 { margin: 0 0 10px 0; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 1.1rem; display: flex; justify-content: space-between; }
        
        /* Forms */
        label { display: block; font-size: 0.8rem; font-weight: bold; color: #666; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; background: #fff; }
        
        /* Buttons */
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: #0288d1; color: white; }
        .btn-outline { background: none; border: 1px solid #ccc; color: #666; padding: 8px; font-size: 0.8rem; }
        .btn-danger { color: var(--danger); font-size: 0.8rem; width: auto; background: none; padding: 0; }
        
        /* Lists */
        .score-item { background: #fefefe; border: 1px solid #eee; padding: 12px; border-radius: 8px; margin-bottom: 8px; list-style: none; position: relative; }
        .row { display: flex; gap: 10px; }
        .clubhouse-tag { background: #e8f5e9; color: var(--dark); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        .hidden { display: none; }
        canvas { max-height: 180px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard">
        <div id="pNameDisplay" style="font-weight:bold; font-size: 1.2rem;">Golfer</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px;">HANDICAP INDEX</div>
        <div style="margin-top:10px;"><canvas id="progChart"></canvas></div>
    </div>

    <div class="card">
        <h3>⚙️ Clubhouse Settings</h3>
        <div class="row">
            <div style="flex:1"><label>Your Name</label><input type="text" id="pName" onchange="updateProfile()"></div>
            <div style="flex:1"><label>Group Key</label><input type="text" id="gKey" onchange="updateProfile()"></div>
        </div>
        <button class="btn-sync" id="syncBtn" onclick="syncData()">🔄 Sync with Clubhouse</button>
    </div>

    <div id="clubhouseCard" class="card hidden">
        <h3>👥 Friends Leaderboard</h3>
        <div id="clubhouseList"></div>
    </div>

    <div class="card">
        <h3>⛳ Post New Round</h3>
        <label>Course</label>
        <select id="courseSelect"></select>
        <div class="row">
            <div style="flex:1"><label>Date</label><input type="date" id="scoreDate"></div>
            <div style="flex:1"><label>Gross Score</label><input type="number" id="scoreVal" placeholder="Ex: 85"></div>
        </div>
        <button class="btn-primary" onclick="submitScore()">Post Score</button>
    </div>

    <div class="card">
        <h3>📝 Score History</h3>
        <ul id="scoreList" style="padding:0; margin:0;"></ul>
    </div>

    <div class="card">
        <h3>🏗️ Course Database <button class="btn-outline" style="width:auto" onclick="toggleElement('courseForm')">+ Add</button></h3>
        <div id="courseForm" class="hidden" style="background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <label>Course Name</label><input type="text" id="ncName">
            <label>Tee</label><input type="text" id="ncTee">
            <div class="row">
                <div><label>Rating</label><input type="number" id="ncRating" step="0.1"></div>
                <div><label>Slope</label><input type="number" id="ncSlope"></div>
            </div>
            <button class="btn-primary" onclick="addCourse()">Save Course</button>
        </div>
        <div id="fullCourseList" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div class="card" style="text-align:center; background:none; box-shadow:none;">
        <button class="btn-outline" onclick="exportData()">💾 Download Data Backup</button>
        <button class="btn-danger" style="margin-top:20px" onclick="clearData()">⚠️ Reset App Memory</button>
    </div>
</div>

<script>
    // --- DATA RECOVERY ENGINE ---
    function recoverAllData() {
        const scoreSlots = ['FINAL_SCORES', 'main_scores', 'golfScores_v14', 'golf_scores', 'golfScores'];
        const courseSlots = ['FINAL_COURSES', 'main_courses', 'golfCourses_v14', 'golf_courses_custom', 'golfCourses'];
        
        let foundScores = [];
        let foundCourses = [];

        scoreSlots.forEach(slot => {
            const d = localStorage.getItem(slot);
            if(d) {
                const p = JSON.parse(d);
                if(Array.isArray(p) && p.length > foundScores.length) foundScores = p;
            }
        });

        courseSlots.forEach(slot => {
            const d = localStorage.getItem(slot);
            if(d) {
                const p = JSON.parse(d);
                if(Array.isArray(p) && p.length > foundCourses.length) foundCourses = p;
            }
        });

        // If data was found, save it to the NEW MASTER KEYS
        if(foundScores.length > 0) localStorage.setItem('MASTER_SCORES', JSON.stringify(foundScores));
        if(foundCourses.length > 0) localStorage.setItem('MASTER_COURSES', JSON.stringify(foundCourses));
    }
    recoverAllData();

    // --- GLOBAL STATE ---
    const API = "https://api.jsonstorage.net/v1/json/";
    let scores = JSON.parse(localStorage.getItem('MASTER_SCORES')) || [];
    let playerName = localStorage.getItem('MASTER_PNAME') || "";
    let groupKey = localStorage.getItem('MASTER_GKEY') || "";
    let myChart = null;

    const defaults = [
        {name: 'Beaver Creek', tee: 'Blue', slope: 130, rating: 72.0},
        {name: 'Santa Maria', tee: 'Blue', slope: 128, rating: 71.5},
        {name: 'Greystone', tee: 'Blue', slope: 128, rating: 70.8},
        {name: 'Carter Plantation', tee: 'Blue', slope: 126, rating: 69.7},
        {name: 'The Island', tee: 'Blue', slope: 135, rating: 73.1}
    ];
    let courses = JSON.parse(localStorage.getItem('MASTER_COURSES')) || defaults;

    function init() {
        document.getElementById('pName').value = playerName;
        document.getElementById('gKey').value = groupKey;
        document.getElementById('scoreDate').valueAsDate = new Date();
        renderCourses();
        updateUI();
        if(playerName && groupKey) syncData();
    }

    function toggleElement(id) { document.getElementById(id).classList.toggle('hidden'); }

    function updateProfile() {
        playerName = document.getElementById('pName').value;
        groupKey = document.getElementById('gKey').value;
        localStorage.setItem('MASTER_PNAME', playerName);
        localStorage.setItem('MASTER_GKEY', groupKey);
        updateUI();
    }

    function renderCourses() {
        const sel = document.getElementById('courseSelect');
        const list = document.getElementById('fullCourseList');
        sel.innerHTML = '<option value="">-- Select Course --</option>';
        list.innerHTML = "";
        courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, i) => {
            sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
            list.innerHTML += `<div style="font-size:0.8rem; border-bottom:1px solid #eee; padding:8px 0; display:flex; justify-content:space-between">
                <span>${c.name} (${c.tee}) - ${c.rating}/${c.slope}</span>
                <button class="btn-danger" onclick="deleteCourse(${i})">✕</button>
            </div>`;
        });
    }

    function addCourse() {
        const name = document.getElementById('ncName').value;
        const tee = document.getElementById('ncTee').value;
        const rat = parseFloat(document.getElementById('ncRating').value);
        const slo = parseInt(document.getElementById('ncSlope').value);
        if(!name || !rat || !slo) return alert("Fill all fields");
        courses.push({name, tee, rating: rat, slope: slo});
        localStorage.setItem('MASTER_COURSES', JSON.stringify(courses));
        renderCourses();
        toggleElement('courseForm');
    }

    function deleteCourse(i) {
        if(confirm("Delete course?")) { courses.splice(i,1); localStorage.setItem('MASTER_COURSES', JSON.stringify(courses)); renderCourses(); }
    }

    function calculateIndex(sList) {
        if (sList.length < 3) return "--";
        let diffs = [...sList].map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = sList.length >= 20 ? 8 : (sList.length >= 15 ? 5 : (sList.length >= 10 ? 3 : 1));
        let avg = diffs.slice(0, n).reduce((a,b) => a+b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function updateUI() {
        const index = calculateIndex(scores);
        document.getElementById('displayIndex').innerText = index;
        document.getElementById('pNameDisplay').innerText = playerName || "Golfer";
        
        const list = document.getElementById('scoreList');
        list.innerHTML = scores.length === 0 ? '<li style="color:gray; font-size:0.8rem">No scores yet</li>' : "";
        
        const chartData = [];
        
        scores.forEach((s, i) => {
            chartData.unshift(s.diff);
            list.innerHTML += `<li class="score-item">
                <div style="display:flex; justify-content:space-between">
                    <strong>${s.score}</strong> <span>${s.courseName}</span>
                    <button class="btn-danger" onclick="deleteScore(${i})">✕</button>
                </div>
                <div style="font-size:0.75rem; color:#666">${s.date} | Diff: ${s.diff} | ${s.rating}/${s.slope}</div>
            </li>`;
        });
        updateChart(chartData);
    }

    function updateChart(data) {
        const ctx = document.getElementById('progChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'line',
            data: { labels: data.map((_,i)=>i+1), datasets: [{ label: 'Diff', data: data, borderColor: 'white', tension: 0.3, fill: false, pointRadius: 2 }] },
            options: { responsive: true, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { color: 'rgba(255,255,255,0.7)' } } } }
        });
    }

    function submitScore() {
        const idx = document.getElementById('courseSelect').value;
        const val = document.getElementById('scoreVal').value;
        if(idx === "" || !val) return alert("Select course and enter score");
        const c = courses[idx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('scoreDate').value, courseName: c.name, score: val, diff: diff, rating: c.rating, slope: c.slope });
        localStorage.setItem('MASTER_SCORES', JSON.stringify(scores));
        updateUI();
        syncData();
        document.getElementById('scoreVal').value = "";
    }

    function deleteScore(i) {
        if(confirm("Delete score?")) { scores.splice(i,1); localStorage.setItem('MASTER_SCORES', JSON.stringify(scores)); updateUI(); syncData(); }
    }

    async function syncData() {
        if(!playerName || !groupKey) return;
        const groupID = btoa(groupKey).replace(/=/g, "");
        const btn = document.getElementById('syncBtn');
        btn.innerText = "Syncing...";
        try {
            const res = await fetch(`${API}${groupID}`);
            let data = res.ok ? await res.json() : {};
            data[playerName] = { index: calculateIndex(scores), history: scores.slice(0,10), updated: new Date().toLocaleTimeString() };
            await fetch(`${API}${groupID}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            renderClubhouse(data);
        } catch (e) { console.error("Sync Error", e); }
        btn.innerText = "🔄 Sync with Clubhouse";
    }

    function renderClubhouse(data) {
        const container = document.getElementById('clubhouseList');
        document.getElementById('clubhouseCard').classList.remove('hidden');
        container.innerHTML = "";
        for (let f in data) {
            if (f === playerName) continue;
            const friend = data[f];
            container.innerHTML += `<div style="border-bottom: 1px solid #eee; padding: 10px 0;">
                <div style="display:flex; justify-content:space-between">
                    <strong>${f}</strong> <span class="clubhouse-tag">${friend.index}</span>
                </div>
                <div style="font-size:0.7rem; color:gray">Last: ${friend.history.map(s => s.score).join(', ')}</div>
            </div>`;
        }
    }

    function exportData() {
        const data = JSON.stringify({scores, courses, playerName, groupKey});
        const blob = new Blob([data], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'golf_master_backup.json';
        a.click();
    }

    function clearData() { if(confirm("Wipe all data?")) { localStorage.clear(); location.reload(); } }

    init();
</script>
</body>
</html>
