<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Recovery</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 4px solid var(--accent); }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; min-height: 4rem; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; padding: 15px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
        .pill { display: inline-block; padding: 8px 12px; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 20px; margin: 5px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .active { background: var(--dark); color: white; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp" style="font-size: 1.2rem;">Don</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.9;">HANDICAP INDEX</div>
</div>

<div class="card">
    <label><b>1. Current Users Found:</b></label>
    <div id="userList" style="margin: 10px 0;"></div>
    
    <label><b>2. Emergency Cloud Pull:</b></label>
    <p style="font-size: 0.75rem; color: #666;">If history is blank, enter "Masters2026" below and hit Pull.</p>
    <input type="text" id="keyIn" value="Masters2026">
    <button onclick="pullCloud()" style="background: var(--dark);">☁️ PULL EVERYTHING FROM CLOUD</button>
</div>

<div class="card">
    <label><b>3. Score History:</b></label>
    <div id="sList">No scores found.</div>
</div>

<div class="card">
    <label><b>4. Course List:</b></label>
    <div id="cList">No courses found.</div>
</div>

<button onclick="resetApp()" style="background:none; color:red; border:none; font-size: 10px;">Full Reset App</button>

<script>
    var pName = localStorage.getItem('golf_pname') || "Don";
    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    var scores = [];
    var knownUsers = JSON.parse(localStorage.getItem('knownUsers')) || ["Don"];

    function resetApp() { if(confirm("Erase all local memory?")) { localStorage.clear(); location.reload(); } }

    function switchUser(name) {
        pName = name;
        localStorage.setItem('golf_pname', name);
        let saved = localStorage.getItem('scores_' + name);
        scores = saved ? JSON.parse(saved) : [];
        render();
    }

    function calc() {
        if (!scores || scores.length < 3) return "--";
        let diffs = [...scores].map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        let n = scores.length >= 20 ? 8 : (scores.length >= 10 ? 3 : 1);
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function render() {
        document.getElementById('pDisp').innerText = pName;
        document.getElementById('idx').innerText = calc();

        // Render Bubbles
        let uL = document.getElementById('userList');
        uL.innerHTML = "";
        knownUsers.forEach(u => {
            uL.innerHTML += `<span class="pill ${u === pName ? 'active' : ''}" onclick="switchUser('${u}')">${u}</span>`;
        });

        // Render Scores
        let sl = document.getElementById('sList');
        sl.innerHTML = scores.length ? "" : "<small>No scores found in phone memory.</small>";
        scores.forEach(s => {
            sl.innerHTML += `<div class="score-item"><b>${s.score}</b> at ${s.courseName||s.course} (${s.date})</div>`;
        });

        // Render Courses
        let cl = document.getElementById('cList');
        cl.innerHTML = courses.length ? "" : "<small>No courses found.</small>";
        courses.forEach(c => {
            cl.innerHTML += `<div class="score-item"><b>${c.name}</b> (${c.tee})</div>`;
        });
    }

    async function pullCloud() {
        const key = document.getElementById('keyIn').value;
        const binId = btoa(key).replace(/=/g, "");
        const btn = document.querySelector('button');
        btn.innerText = "Connecting...";

        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            if (!res.ok) throw new Error();
            const cloud = await res.json();

            // Restore Courses
            courses = cloud.courses || [];
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));

            // Restore Players
            knownUsers = Object.keys(cloud.players);
            localStorage.setItem('knownUsers', JSON.stringify(knownUsers));

            // Save each player's scores locally
            knownUsers.forEach(u => {
                localStorage.setItem('scores_' + u, JSON.stringify(cloud.players[u].history));
            });

            btn.innerText = "✅ Success!";
            switchUser(pName);
        } catch (e) {
            btn.innerText = "❌ Error: Cloud Empty or Key Wrong";
            alert("Could not find data for key: " + key);
        }
    }

    // Init
    switchUser(pName);
</script>
</body>
</html>
