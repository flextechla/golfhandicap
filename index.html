<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Pro</title>
    <style>
        :root {
            --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000;
            --bg: #f4f6f8; --text: #333; --white: #ffffff;
            --danger: #d32f2f; --success: #4CAF50; --info: #0288d1;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .dashboard-card { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .handicap-number { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 5px 0; }
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 15px; }
        .card-header { font-weight: 700; font-size: 1.1rem; color: var(--dark); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-header.with-border { border-bottom: 2px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 15px; cursor: default; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: #555; }
        select, input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: var(--info); color: white; margin-top: 10px; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; width: auto; border-radius: 4px; border: 1px solid #ddd; background: white; }
        .score-item { background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; list-style: none; }
        .hidden { display: none; }
        .arrow { transition: transform 0.2s; font-size: 0.8rem; }
        .collapsed .arrow { transform: rotate(-90deg); }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-card">
        <div id="pNameDisplay" style="font-weight:bold; margin-bottom:5px;">Golfer</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">CURRENT INDEX</div>
    </div>

    <div class="card">
        <div class="card-header" onclick="toggleSection('syncBox', this)">
            <span>👥 Clubhouse Sync</span><span class="arrow">▼</span>
        </div>
        <div id="syncBox" class="hidden" style="margin-top:15px;">
            <label>Display Name</label>
            <input type="text" id="playerNameInput" onchange="saveSyncSettings()">
            <label>Group Secret Key</label>
            <input type="text" id="groupKeyInput" onchange="saveSyncSettings()">
            <button class="btn-sync" onclick="syncWithFriends()">🔄 Sync Now</button>
        </div>
    </div>

    <div id="clubhouseCard" class="card hidden">
        <div class="card-header"><span>🏆 Clubhouse Leaderboard</span></div>
        <div id="clubhouseList" style="margin-top:15px;"></div>
    </div>

    <div class="card">
        <div class="card-header with-border"><span>⛳ Post New Score</span></div>
        <label>Course</label>
        <select id="courseSelect" onchange="updateCoursePreview('coursePreview', 'courseSelect')"></select>
        <div id="coursePreview" style="font-size:0.8rem; text-align:center; color:var(--primary); margin-bottom:10px; font-weight:bold;"></div>
        <div class="row">
            <div class="col"><label>Date</label><input type="date" id="scoreDate"></div>
            <div class="col"><label>Score</label><input type="number" id="scoreVal" placeholder="Gross"></div>
        </div>
        <button id="postBtn" class="btn-primary" onclick="submitScore()">Post Score</button>
    </div>

    <div class="card">
        <div class="card-header" onclick="toggleSection('historyContent', this)">
            <span>📝 Score History</span><span class="arrow">▼</span>
        </div>
        <div id="historyContent" class="hidden">
            <ul id="scoreList" class="score-list" style="margin-top:15px; padding:0;"></ul>
        </div>
    </div>

    <div class="card">
        <div class="card-header" onclick="toggleSection('courseDbContent', this)">
            <span>⛳ Manage Course Database</span><span class="arrow">▼</span>
        </div>
        <div id="courseDbContent" class="hidden">
            <button class="btn-primary" style="margin:15px 0;" onclick="toggleSection('newCourseForm')">+ Add New Course</button>
            <div id="newCourseForm" class="hidden edit-drawer">
                <label>Name</label><input type="text" id="ncName">
                <label>Tee</label><input type="text" id="ncTee">
                <div class="row">
                    <div class="col"><label>Rating</label><input type="number" id="ncRating" step="0.1"></div>
                    <div class="col"><label>Slope</label><input type="number" id="ncSlope"></div>
                </div>
                <button class="btn-primary" onclick="addNewCourse()">Save Course</button>
            </div>
            <ul id="courseDbList" class="score-list" style="padding:0;"></ul>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://api.jsonstorage.net/v1/json/";
    
    let courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    let scores = JSON.parse(localStorage.getItem('golfScores_v14')) || [];
    let playerName = localStorage.getItem('golf_pname') || "";
    let groupKey = localStorage.getItem('golf_gkey') || "";

    function init() {
        document.getElementById('scoreDate').valueAsDate = new Date();
        document.getElementById('playerNameInput').value = playerName;
        document.getElementById('groupKeyInput').value = groupKey;
        updateUI();
        if(playerName && groupKey) syncWithFriends();
    }

    function toggleSection(id, header) {
        document.getElementById(id).classList.toggle('hidden');
        if(header) header.classList.toggle('collapsed');
    }

    function saveSyncSettings() {
        playerName = document.getElementById('playerNameInput').value;
        groupKey = document.getElementById('groupKeyInput').value;
        localStorage.setItem('golf_pname', playerName);
        localStorage.setItem('golf_gkey', groupKey);
        document.getElementById('pNameDisplay').innerText = playerName || "Golfer";
    }

    function updateUI() {
        document.getElementById('pNameDisplay').innerText = playerName || "Golfer";
        renderDropdowns();
        renderScoreList();
        renderCourseDb();
        calculateHandicap();
    }

    function calculateHandicap(data = scores) {
        if (data.length < 3) return "--";
        let diffs = [...data].map(r => parseFloat(r.diff)).sort((a,b) => a-b);
        let n = data.length >= 20 ? 8 : (data.length >= 15 ? 5 : (data.length >= 10 ? 3 : 1));
        let avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        return (Math.floor(avg * 10) / 10).toFixed(1);
    }

    function renderDropdowns() {
        const selects = document.querySelectorAll('select[id^="courseSelect"]');
        selects.forEach(sel => {
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">-- Choose Course --</option>';
            courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, i) => {
                sel.innerHTML += `<option value="${i}">${c.name} (${c.tee})</option>`;
            });
            if(currentVal) sel.value = currentVal;
        });
    }

    function updateCoursePreview(previewId, selectId) {
        const idx = document.getElementById(selectId).value;
        const box = document.getElementById(previewId);
        if (idx === "") { box.innerText = ""; return; }
        const c = courses[idx];
        box.innerText = `Rating: ${c.rating} / Slope: ${c.slope}`;
    }

    // --- SCORE HISTORY IN-PLACE EDITING ---
    function renderScoreList() {
        const list = document.getElementById('scoreList');
        list.innerHTML = "";
        scores.forEach((s, i) => {
            list.innerHTML += `
                <li class="score-item">
                    <div class="score-top">
                        <div><small>${s.date}</small><br><strong>${s.courseName}</strong></div>
                        <div style="text-align:right"><strong>${s.score}</strong><br><small>Diff: ${s.diff}</small></div>
                    </div>
                    <div style="text-align:right; margin-top:8px;">
                        <button class="btn-sm" onclick="toggleSection('edit-score-${i}')">Edit</button>
                        <button class="btn-sm" style="color:red" onclick="deleteScore(${i})">Del</button>
                    </div>
                    <div id="edit-score-${i}" class="hidden edit-drawer">
                        <label>Course</label>
                        <select id="edit-score-course-${i}" onchange="updateCoursePreview('edit-score-pre-${i}', 'edit-score-course-${i}')"></select>
                        <div id="edit-score-pre-${i}" style="font-size:0.75rem; text-align:center; color:var(--primary); margin-bottom:5px; font-weight:bold;"></div>
                        <div class="row">
                            <div class="col"><label>Date</label><input type="date" id="edit-score-date-${i}" value="${s.date}"></div>
                            <div class="col"><label>Score</label><input type="number" id="edit-score-val-${i}" value="${s.score}"></div>
                        </div>
                        <button class="btn-primary" onclick="updateScore(${i})">Save Changes</button>
                    </div>
                </li>`;
            
            // Populate the dropdown for this specific item
            setTimeout(() => {
                const sel = document.getElementById(`edit-score-course-${i}`);
                courses.sort((a,b) => a.name.localeCompare(b.name)).forEach((c, idx) => {
                    sel.innerHTML += `<option value="${idx}">${c.name} (${c.tee})</option>`;
                });
                const courseIdx = courses.findIndex(c => c.name === s.courseName);
                if(courseIdx !== -1) {
                    sel.value = courseIdx;
                    updateCoursePreview(`edit-score-pre-${i}`, `edit-score-course-${i}`);
                }
            }, 0);
        });
    }

    function updateScore(i) {
        const cIdx = document.getElementById(`edit-score-course-${i}`).value;
        const val = parseFloat(document.getElementById(`edit-score-val-${i}`).value);
        if(cIdx === "" || !val) return alert("Select course and score");
        const c = courses[cIdx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        
        scores[i] = {
            date: document.getElementById(`edit-score-date-${i}`).value,
            courseName: c.name,
            score: val,
            diff: diff
        };
        
        localStorage.setItem('golfScores_v14', JSON.stringify(scores));
        updateUI();
        syncWithFriends();
    }

    function submitScore() {
        const cIdx = document.getElementById('courseSelect').value;
        const val = parseFloat(document.getElementById('scoreVal').value);
        if(cIdx === "" || !val) return alert("Select course and score");
        const c = courses[cIdx];
        const diff = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('scoreDate').value, courseName: c.name, score: val, diff: diff });
        localStorage.setItem('golfScores_v14', JSON.stringify(scores));
        document.getElementById('scoreVal').value = "";
        updateUI();
        syncWithFriends();
    }

    function deleteScore(i) { if(confirm("Delete round?")) { scores.splice(i, 1); localStorage.setItem('golfScores_v14', JSON.stringify(scores)); updateUI(); syncWithFriends(); } }

    // --- COURSE DATABASE IN-PLACE EDITING ---
    function renderCourseDb() {
        const list = document.getElementById('courseDbList');
        list.innerHTML = "";
        courses.forEach((c, i) => {
            list.innerHTML += `
                <li class="score-item">
                    <div class="score-top">
                        <div><strong>${c.name}</strong> (${c.tee})<br><small>R: ${c.rating} / S: ${c.slope}</small></div>
                        <div>
                            <button class="btn-sm" onclick="toggleSection('edit-course-${i}')">Edit</button>
                            <button class="btn-sm" style="color:red" onclick="deleteCourse(${i})">Del</button>
                        </div>
                    </div>
                    <div id="edit-course-${i}" class="hidden edit-drawer">
                        <label>Name</label><input type="text" id="edit-name-${i}" value="${c.name}">
                        <label>Tee</label><input type="text" id="edit-tee-${i}" value="${c.tee}">
                        <div class="row">
                            <div class="col"><label>Rating</label><input type="number" id="edit-rat-${i}" step="0.1" value="${c.rating}"></div>
                            <div class="col"><label>Slope</label><input type="number" id="edit-slo-${i}" value="${c.slope}"></div>
                        </div>
                        <button class="btn-primary" onclick="updateCourse(${i})">Save Changes</button>
                    </div>
                </li>`;
        });
    }

    function addNewCourse() {
        const name = document.getElementById('ncName').value;
        const tee = document.getElementById('ncTee').value;
        const rat = parseFloat(document.getElementById('ncRating').value);
        const slo = parseInt(document.getElementById('ncSlope').value);
        if(!name || !rat || !slo) return alert("Fill all fields");
        courses.push({name, tee, rating: rat, slope: slo});
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        document.getElementById('ncName').value = "";
        toggleSection('newCourseForm');
        updateUI();
    }

    function updateCourse(i) {
        courses[i] = {
            name: document.getElementById(`edit-name-${i}`).value,
            tee: document.getElementById(`edit-tee-${i}`).value,
            rating: parseFloat(document.getElementById(`edit-rat-${i}`).value),
            slope: parseInt(document.getElementById(`edit-slo-${i}`).value)
        };
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        updateUI();
    }

    function deleteCourse(i) { if(confirm("Delete course?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); updateUI(); } }

    async function syncWithFriends() {
        if(!playerName || !groupKey) return;
        const binId = btoa(groupKey).replace(/=/g, "");
        try {
            const res = await fetch(`${API_BASE}${binId}`);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            cloud.players[playerName] = { index: document.getElementById('displayIndex').innerText, history: scores.slice(0, 10) };
            let cmap = new Map();
            [...cloud.courses, ...courses].forEach(c => cmap.set(`${c.name}-${c.tee}`, c));
            cloud.courses = Array.from(cmap.values());
            courses = cloud.courses;
            await fetch(`${API_BASE}${binId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cloud) });
            renderClubhouse(cloud.players);
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
            updateUI();
        } catch (e) { console.error(e); }
    }

    function renderClubhouse(players) {
        const list = document.getElementById('clubhouseList');
        document.getElementById('clubhouseCard').classList.remove('hidden');
        list.innerHTML = "";
        for (let name in players) {
            if (name === playerName) continue;
            list.innerHTML += `<div class="score-item">👤 <strong>${name}</strong>: ${players[name].index}</div>`;
        }
    }

    init();
</script>
</body>
</html>
