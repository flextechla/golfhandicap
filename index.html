<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Commissioner</title>
    <style>
        :root {
            --primary: #2E7D32; --dark: #1B5E20; --accent: #FFA000;
            --bg: #f4f6f8; --text: #333; --white: #ffffff;
            --danger: #d32f2f; --success: #4CAF50; --info: #0288d1;
        }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .dashboard-card { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .handicap-number { font-size: 3.5rem; font-weight: 800; line-height: 1; margin: 5px 0; }
        .card { background: var(--white); border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); margin-bottom: 15px; overflow: hidden; }
        .card-header { font-weight: 700; font-size: 1.1rem; color: var(--dark); display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 20px; user-select: none; }
        .card-content { padding: 0 20px 20px 20px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85rem; color: #555; }
        select, input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; }
        .row { display: flex; gap: 10px; }
        .col { flex: 1; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:disabled { background: #ccc !important; color: #666; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sync { background: var(--info); color: white; margin-top: 10px; }
        .btn-sm { padding: 6px 10px; font-size: 0.75rem; width: auto; border-radius: 4px; border: 1px solid #ddd; background: white; }
        .score-item { background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; padding: 12px; margin-bottom: 10px; list-style: none; }
        .hidden { display: none; }
        .arrow { transition: transform 0.2s; font-size: 0.8rem; }
        .collapsed .arrow { transform: rotate(-90deg); }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 15px; border-radius: 8px; margin-top: 10px; }
        .admin-tag { background: #000; color: #fff; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div class="dashboard-card">
        <div id="pNameDisplay" style="font-weight:bold; margin-bottom:5px;">Golfer</div>
        <div class="handicap-number" id="displayIndex">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8;">WHS HANDICAP INDEX</div>
    </div>

    <div class="card">
        <div id="syncHeader" class="card-header collapsed" onclick="toggleSection('syncBox', 'syncHeader')">
            <span>👥 Clubhouse Setup & Sync</span><span class="arrow">▼</span>
        </div>
        <div id="syncBox" class="card-content hidden">
            <label>Your Name</label>
            <input type="text" id="playerNameInput" placeholder="Tiger" onchange="saveSyncSettings()">
            <label>Group Secret Key</label>
            <input type="text" id="groupKeyInput" placeholder="Room Password" onchange="saveSyncSettings()">
            <button class="btn-sync" id="syncBtn" onclick="syncWithFriends()">🔄 Sync with Clubhouse</button>
        </div>
    </div>

    <div id="clubhouseCard" class="card hidden">
        <div class="card-header"><span>🏆 Friend Leaderboard</span></div>
        <div id="clubhouseList" class="card-content"></div>
    </div>

    <div class="card">
        <div id="postHeader" class="card-header collapsed" onclick="toggleSection('postNewScoreBox', 'postHeader')">
            <span>⛳ Post New Score</span><span class="arrow">▼</span>
        </div>
        <div id="postNewScoreBox" class="card-content hidden">
            <label>Course</label>
            <select id="mainCourseSelect" onchange="updateCoursePreview()"></select>
            <div id="mainCoursePre" style="font-size:0.8rem; text-align:center; color:var(--primary); margin-bottom:10px; font-weight:bold;"></div>
            <div class="row">
                <div class="col"><label>Date</label><input type="date" id="mainScoreDate"></div>
                <div class="col"><label>Score</label><input type="number" id="mainScoreVal" placeholder="--"></div>
            </div>
            <button id="mainPostBtn" class="btn-primary" onclick="submitNewScore()" disabled>Save Round</button>
        </div>
    </div>

    <div class="card">
        <div id="historyHeader" class="card-header collapsed" onclick="toggleSection('historyContent', 'historyHeader')">
            <span>📝 Score History</span><span class="arrow">▼</span>
        </div>
        <div id="historyContent" class="card-content hidden">
            <ul id="scoreList" style="padding:0; margin:0;"></ul>
        </div>
    </div>

    <div class="card">
        <div id="courseHeader" class="card-header collapsed" onclick="toggleSection('courseDbContent', 'courseHeader')">
            <span>⛳ Manage Course Database</span><span class="arrow">▼</span>
        </div>
        <div id="courseDbContent" class="card-content hidden">
            <button class="btn-primary" style="margin:15px 0;" onclick="toggleSection('newCourseForm')">+ Add New Course</button>
            <div id="newCourseForm" class="hidden edit-drawer">
                <label>Course Name</label><input type="text" id="ncName">
                <label>Tee Color</label><input type="text" id="ncTee">
                <div class="row">
                    <div class="col"><label>Rating</label><input type="number" id="ncRating" step="0.1"></div>
                    <div class="col"><label>Slope</label><input type="number" id="ncSlope"></div>
                </div>
                <button class="btn-primary" onclick="addNewCourse()">Save Course</button>
            </div>
            <ul id="courseDbList" style="padding:0; margin:0;"></ul>
        </div>
    </div>
</div>
