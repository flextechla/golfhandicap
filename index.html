<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Handicap Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #2e7d32; --dark: #1b5e20; --accent: #ffa000;
      --bg: #f4f6f8; --text: #333; --white: #ffffff; --danger: #d32f2f;
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; }
    
    .dashboard-header {
      background: linear-gradient(135deg, var(--primary), var(--dark));
      color: white; padding: 25px 20px; text-align: center;
      border-bottom: 5px solid var(--accent);
    }
    .hcp-display { font-size: 4rem; font-weight: 900; margin: 10px 0; }
    
    .nav-tabs {
      display: flex; background: white; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto;
    }
    .tab-link {
      flex: 1; padding: 15px; text-align: center; font-size: 0.7rem;
      font-weight: bold; cursor: pointer; color: #666; border-bottom: 3px solid transparent;
      white-space: nowrap;
    }
    .tab-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #ddd; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-link { background: none; color: var(--primary); font-size: 0.85rem; padding: 5px; text-decoration: underline; cursor: pointer; border: none; }
    
    .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .hidden { display: none !important; }
    .round-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>

<div id="view-auth" class="container" style="margin-top: 10vh;">
  <div class="card" style="text-align: center;">
    <h2 style="color: var(--primary); margin-top: 0;">⛳ Golf Tracker</h2>
    <input type="email" id="email" class="form-control" placeholder="Email" autocomplete="email">
    <input type="password" id="password" class="form-control" placeholder="Password">
    <button class="btn btn-primary" id="btn-login" onclick="handleAuth()">Sign In / Create Account</button>
    <button class="btn-link" onclick="forgotPassword()">Forgot Password?</button>
    <p id="auth-msg" style="font-size: 0.8rem; color: var(--danger);"></p>
  </div>
</div>

<div id="view-app" class="hidden">
  <div class="dashboard-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="user-display-name" style="font-weight: bold; font-size: 0.9rem;">Golfer</span>
      <button onclick="logoutNow()" style="background:none; border:1px solid white; color:white; border-radius:4px; padding:4px 10px; cursor: pointer;">Logout</button>
    </div>
    <div class="hcp-display" id="dash-hcp">--</div>
    <div style="font-size: 0.7rem; opacity: 0.8; letter-spacing: 1px; font-weight: bold;">WHS HANDICAP INDEX</div>
  </div>

  <div class="nav-tabs">
    <div class="tab-link active" onclick="showTab('dash', this)">DASHBOARD</div>
    <div class="tab-link" onclick="showTab('add', this)">ADD SCORE</div>
    <div class="tab-link" onclick="showTab('leader', this)">RANKINGS</div>
    <div class="tab-link" onclick="showTab('groups', this)">GROUPS</div>
    <div class="tab-link" onclick="showTab('settings', this)">SETTINGS</div>
  </div>

  <div class="container">
    <div id="tab-dash">
      <div class="card"><h3>Recent Rounds</h3><div id="recent-list"></div></div>
    </div>

    <div id="tab-add" class="hidden">
      <div class="card">
        <h3>Post Score</h3>
        <select id="r-course-select" class="form-control" onchange="autoFillCourse()"></select>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <input type="number" step="0.1" id="r-rating" class="form-control" placeholder="Rating">
          <input type="number" id="r-slope" class="form-control" placeholder="Slope">
        </div>
        <input type="number" id="r-score" class="form-control" placeholder="Gross Score">
        <input type="date" id="r-date" class="form-control">
        <button class="btn btn-primary" onclick="saveRound()">Save Round</button>
      </div>
    </div>

    <div id="tab-leader" class="hidden">
      <div class="card">
        <label>Filter by Group</label>
        <select id="leader-group-filter" class="form-control" onchange="loadLeaderboard()"></select>
        <div id="lb-list"></div>
      </div>
    </div>

    <div id="tab-groups" class="hidden">
      <div class="card">
        <h3>Create Group</h3>
        <input type="text" id="group-name-input" class="form-control" placeholder="Group Name">
        <button class="btn btn-primary" onclick="createGroup()">Create</button>
        <hr>
        <h3>Join Group</h3>
        <input type="text" id="invite-code-input" class="form-control" placeholder="Invite Code">
        <button class="btn btn-primary" onclick="joinGroup()">Join</button>
      </div>
      <div class="card"><h3>My Groups</h3><div id="my-groups-list"></div></div>
    </div>

    <div id="tab-settings" class="hidden">
      <div class="card">
        <h3>Account</h3>
        <input type="text" id="set-name" class="form-control" placeholder="Update Display Name">
        <button class="btn btn-primary" onclick="updateName()">Update Name</button>
        <button class="btn btn-danger" style="margin-top:20px;" onclick="deleteOwnAccount()">Delete My Account</button>
      </div>
      <div class="card" id="super-admin-card" style="border: 2px solid var(--danger); display:none;">
        <h3 style="color: var(--danger);">SUPER ADMIN</h3>
        <p>You have full deletion power.</p>
      </div>
    </div>
  </div>
</div>
