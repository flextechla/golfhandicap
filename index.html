<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Pro | Groups Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #2E7D32; 
            --dark: #1B5E20; 
            --bg: #f4f6f8; 
            --accent: #FFA000; 
            --red: #d32f2f; 
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 0; padding-bottom: 80px; }
        
        /* Dashboard */
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 30px 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .handicap { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        
        /* UI Components */
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; margin-bottom: 15px; border: 1px solid #ddd; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .header { background: #f8f9fa; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .content { padding: 15px; display: none; }
        .content.active { display: block; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        .auth-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; z-index: 1000; }
        .btn-alt { background: #f0f0f0; color: #333; }
        
        /* Lists */
        .score-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .league-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .league-pill { display: inline-block; padding: 5px 15px; background: rgba(255,255,255,0.2); color: white; border-radius: 20px; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

<div id="app" style="display:none;">
    <div class="dashboard">
        <div id="pName" style="font-size: 1.1rem; font-weight: 600; opacity: 0.9;">Golfer Profile</div>
        <div class="handicap" id="handicapDisplay">--</div>
        <div style="font-size: 0.8rem; opacity: 0.8; letter-spacing: 1px;">WHS HANDICAP INDEX</div>
        <div id="activeLeaguePill" class="league-pill">Loading Leagues...</div>
    </div>

    <div class="container">
        <div class="card">
            <div class="header" onclick="toggle('groupsSec')"><span>👥 My Groups & Leagues</span><span>▼</span></div>
            <div id="groupsSec" class="content">
                <button class="btn-alt" onclick="promptCreateLeague()">+ Create New League</button>
                <button class="btn-alt" onclick="promptJoinLeague()">🔗 Join via Invite Code</button>
                <div id="leagueList" style="margin-top:15px;"></div>
            </div>
        </div>

        <div class="card">
            <div class="header" onclick="toggle('postSec')"><span>⛳ Post New Score</span><span>▼</span></div>
            <div id="postSec" class="content">
                <label>Target League (Group)</label>
                <select id="leagueSelect"></select>
                <input type="text" id="courseName" placeholder="Course Name">
                <input type="number" id="grossScore" placeholder="Gross Score">
                <input type="date" id="datePlayed">
                <button onclick="saveRound()">Save Round to Cloud</button>
            </div>
        </div>

        <div class="card">
            <div class="header" onclick="toggle('historySec')"><span>📝 Score History</span><span>▼</span></div>
            <div id="historySec" class="content active">
                <div id="scoreHistory"></div>
            </div>
        </div>
    </div>
</div>

<div id="authOverlay" style="position:fixed; inset:0; background:var(--primary); display:flex; align-items:center; justify-content:center; padding:20px; z-index:2000;">
    <div style="background:white; padding:30px; border-radius:20px; width:100%; max-width:400px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
        <h2 style="color:var(--dark); margin-bottom: 5px;">⛳ Golf Tracker Pro</h2>
        <p style="color:#666; font-size: 0.9rem; margin-bottom: 20px;">Manage your handicap and groups.</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth('login')">Sign In</button>
        <button class="btn-alt" onclick="handleAuth('signup')">Create Account</button>
    </div>
</div>

<div class="auth-footer" id="footer" style="display:none;">
    <div id="userEmail" style="font-size: 0.75rem; color: #666; display: flex; align-items: center;">...</div>
    <button class="btn-alt" style="width: auto; margin: 0;" onclick="logout()">Sign Out</button>
</div>

<script>
    // Configuration - Using your provided Golf project credentials
    const SUPABASE_URL = 'https://lxxlrujrxtphozisppsq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx4eGxydWpyeHRwaG96aXNwcHNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjcwNTg3MTIsImV4cCI6MjA4MjYzNDcxMn0.cwLpWtOP7LJm1B9zczskVMU2vPL6shSJFyTb0Ox2vh8';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;
    let myLeagues = [];
    let rounds = [];

    // App Initialization
    window.onload = () => {
        sb.auth.onAuthStateChange((event, session) => {
            if (session) {
                user = session.user;
                showApp();
            } else {
                showAuth();
            }
        });
        document.getElementById('datePlayed').valueAsDate = new Date();
    };

    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        if(!email || !password) return alert("Please fill in all fields");

        const res = type === 'signup' 
            ? await sb.auth.signUp({ email, password }) 
            : await sb.auth.signInWithPassword({ email, password });
        
        if (res.error) alert(res.error.message);
    }

    async function showApp() {
        document.getElementById('authOverlay').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('footer').style.display = 'flex';
        document.getElementById('userEmail').innerText = "Logged in: " + user.email;
        document.getElementById('pName').innerText = user.email.split('@')[0].toUpperCase();
        await loadData();
    }

    function showAuth() {
        document.getElementById('authOverlay').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        document.getElementById('footer').style.display = 'none';
    }

    async function loadData() {
        // 1. Fetch Leagues user belongs to
        const { data: memberOf } = await sb.from('league_members').select('league_id').eq('user_id', user.id);
        const leagueIds = memberOf ? memberOf.map(m => m.league_id) : [];

        if (leagueIds.length > 0) {
            const { data: leagues } = await sb.from('leagues').select('*').in('id', leagueIds);
            myLeagues = leagues || [];
        } else {
            myLeagues = [];
        }
        
        // 2. Fetch Rounds for the player
        const { data: roundData } = await sb.from('rounds')
            .select('*')
            .eq('player_id', user.id)
            .order('played_at', { ascending: false });
        
        rounds = roundData || [];
        render();
    }

    function render() {
        // League List Rendering
        const lList = document.getElementById('leagueList');
        lList.innerHTML = myLeagues.length ? myLeagues.map(l => `
            <div class="league-item">
                <div>
                    <strong>${l.name}</strong><br>
                    <code style="font-size:0.7rem; color:var(--primary)">Invite Code: ${l.invite_code}</code>
                </div>
                <button class="btn-alt" style="width:auto; padding:5px 10px;" onclick="copyCode('${l.invite_code}')">Copy</button>
            </div>
        `).join('') : '<small style="color:#999">You haven\'t joined any groups yet.</small>';

        // Dropdown for Posting
        const lSel = document.getElementById('leagueSelect');
        lSel.innerHTML = '<option value="">Personal Score (No Group)</option>' + 
            myLeagues.map(l => `<option value="${l.id}">${l.name}</option>`).join('');

        // Score History
        const rList = document.getElementById('scoreHistory');
        rList.innerHTML = rounds.length ? rounds.map(r => `
            <div class="score-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <span style="font-weight:bold; font-size:1.2rem;">${r.score}</span>
                        <span style="font-size:0.8rem; color:#666; margin-left:10px;">${r.course_name}</span>
                    </div>
                    <span style="font-size:0.75rem; color:#999;">${r.played_at}</span>
                </div>
                <div style="font-size:0.7rem; margin-top:5px; color:var(--primary); font-weight:700;">
                    DIFF: ${r.differential}
                </div>
            </div>
        `).join('') : '<small style="color:#999">No rounds posted yet.</small>';

        document.getElementById('activeLeaguePill').innerText = `${myLeagues.length} Groups Active`;
        calculateHandicap();
    }

    async function saveRound() {
        const score = parseInt(document.getElementById('grossScore').value);
        const course = document.getElementById('courseName').value;
        const date = document.getElementById('datePlayed').value;
        const leagueId = document.getElementById('leagueSelect').value || null;

        if(!score || !course || !date) return alert("Please fill in score, course, and date");

        const diff = ((score - 72) * 113 / 113).toFixed(1); // Simplified formula for base handicapping

        const { error } = await sb.from('rounds').insert([{
            player_id: user.id,
            player_name: user.email.split('@')[0],
            league_id: leagueId ? parseInt(leagueId) : null,
            score: score,
            course_name: course,
            played_at: date,
            differential: diff
        }]);

        if (error) {
            alert("Error saving: " + error.message);
        } else {
            document.getElementById('grossScore').value = '';
            document.getElementById('courseName').value = '';
            await loadData();
            alert("Score synced to cloud!");
        }
    }

    async function promptCreateLeague() {
        const name = prompt("Enter Group/League Name:");
        if (!name) return;
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        
        const { data: league, error } = await sb.from('leagues').insert([{
            name: name, 
            invite_code: code, 
            admin_id: user.id
        }]).select().single();

        if (error) {
            alert(error.message);
        } else {
            await sb.from('league_members').insert([{ league_id: league.id, user_id: user.id }]);
            await loadData();
            alert(`Group Created! Share code ${code} with your friends.`);
        }
    }

    async function promptJoinLeague() {
        const code = prompt("Enter 6-digit Invite Code:");
        if(!code) return;
        
        const { data: league, error } = await sb.from('leagues').select('*').eq('invite_code', code.toUpperCase()).single();
        
        if (league) {
            const { error: joinError } = await sb.from('league_members').insert([{ league_id: league.id, user_id: user.id }]);
            if(joinError) alert("You are already a member of this group.");
            else await loadData();
        } else {
            alert("Invalid Invite Code.");
        }
    }

    function calculateHandicap() {
        if (rounds.length < 3) {
            document.getElementById('handicapDisplay').innerText = "--";
            return;
        }
        const diffs = rounds.map(r => parseFloat(r.differential)).sort((a,b) => a-b);
        const numToUse = Math.min(diffs.length, 8);
        const avg = diffs.slice(0, numToUse).reduce((a,b) => a+b, 0) / numToUse;
        document.getElementById('handicapDisplay').innerText = (avg * 0.96).toFixed(1);
    }

    function toggle(id) {
        const el = document.getElementById(id);
        const all = ['groupsSec', 'postSec', 'historySec'];
        all.forEach(sec => { if(sec !== id) document.getElementById(sec).style.display = 'none'; });
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function copyCode(code) {
        navigator.clipboard.writeText(code);
        alert("Code copied to clipboard!");
    }

    async function logout() { 
        if(confirm("Sign out of Golf Tracker?")) await sb.auth.signOut(); 
    }
</script>
</body>
</html>
