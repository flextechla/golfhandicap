<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker Commissioner</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .handicap { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; overflow: hidden; }
        .header { background: #eee; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; }
        .content { padding: 15px; display: none; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 12px; }
        button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; list-style: none; }
        .edit-drawer { background: #fff; border: 2px solid var(--primary); padding: 10px; border-radius: 8px; margin-top: 10px; display: none; }
        .admin-box { background: #fffde7; border: 2px dashed var(--accent); padding: 10px; border-radius: 8px; margin-top: 10px; border-color: orange; }
        .btn-outline { background: #fff; color: #333; border: 1px solid #ccc; width: auto; padding: 5px 10px; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="dashboard">
    <div id="pDisp">Golfer</div>
    <div class="handicap" id="idx">--</div>
    <div style="font-size: 0.8rem; opacity: 0.8;">WHS HANDICAP INDEX</div>
</div>

<div class="card">
    <div class="header" onclick="toggle('sync')"><span>👥 Clubhouse Sync</span><span>▼</span></div>
    <div id="sync" class="content">
        <label>Your Name</label><input type="text" id="nameIn" onchange="saveSet()">
        <label>Group Key (or Admin Password)</label><input type="password" id="keyIn" onchange="saveSet()">
        <button onclick="sync()">Sync Now</button>
        <div id="cbList" style="margin-top:10px;"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('post')"><span>⛳ Post New Score</span><span>▼</span></div>
    <div id="post" class="content">
        <label>Course</label><select id="cSel"></select>
        <label>Date</label><input type="date" id="dIn">
        <label>Gross Score</label><input type="number" id="sIn">
        <button onclick="addS()">Save Round</button>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('hist')"><span>📝 Score History</span><span>▼</span></div>
    <div id="hist" class="content">
        <div id="sList"></div>
    </div>
</div>

<div class="card">
    <div class="header" onclick="toggle('course')"><span>⛳ Manage Courses</span><span>▼</span></div>
    <div id="course" class="content">
        <button onclick="toggle('nc')">+ Add New Course</button>
        <div id="nc" style="display:none; border:1px dashed #ccc; padding:10px; margin: 10px 0;">
            <label>Name</label><input type="text" id="ncN">
            <label>Tee</label><input type="text" id="ncT">
            <label>Rating</label><input type="number" id="ncR" step="0.1">
            <label>Slope</label><input type="number" id="ncS">
            <button onclick="addC()">Save Course</button>
        </div>
        <div id="cList"></div>
    </div>
</div>

<script>
    const MASTER_PASS = "golf2026";
    let isAdmin = false;

    function toggle(id) {
        var x = document.getElementById(id);
        x.style.display = (x.style.display === "block") ? "none" : "block";
    }

    var courses = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
    var scores = JSON.parse(localStorage.getItem('golfScores_v14')) || [];
    var pName = localStorage.getItem('golf_pname') || "";
    var gKey = localStorage.getItem('golf_gkey') || "";

    function saveSet() {
        pName = document.getElementById('nameIn').value;
        gKey = document.getElementById('keyIn').value;
        isAdmin = (gKey === MASTER_PASS);
        localStorage.setItem('golf_pname', pName);
        localStorage.setItem('golf_gkey', gKey);
        render();
    }

    function render() {
        document.getElementById('pDisp').innerHTML = pName + (isAdmin ? ' <span style="background:black; color:white; font-size:10px; padding:2px 5px; border-radius:3px;">COMMISSIONER</span>' : '');
        
        var sel = document.getElementById('cSel');
        sel.innerHTML = '<option value="">-- Choose Course --</option>';
        courses.forEach((c, i) => {
            sel.innerHTML += '<option value="'+i+'">'+c.name+' ('+c.tee+')</option>';
        });

        var sl = document.getElementById('sList');
        sl.innerHTML = "";
        scores.forEach((s, i) => {
            var nameToDisplay = s.courseName || s.course || "Unknown Course";
            sl.innerHTML += '<div class="score-item"><b>'+s.score+'</b> at '+nameToDisplay+'<br><small>'+s.date+' (Diff: '+s.diff+')</small>' +
                '<div style="text-align:right; margin-top:5px;">' +
                '<button class="btn-outline" onclick="toggle(\'ed-s-'+i+'\')">Edit</button>' +
                '<button class="btn-outline" style="color:red" onclick="delS('+i+')">Del</button>' +
                '</div>' +
                '<div id="ed-s-'+i+'" class="edit-drawer">' +
                '<label>New Score</label><input type="number" id="ev-'+i+'" value="'+s.score+'">' +
                '<button onclick="updateS('+i+')">Save Changes</button>' +
                '</div></div>';
        });

        var cl = document.getElementById('cList');
        cl.innerHTML = "";
        courses.forEach((c, i) => {
            cl.innerHTML += '<div class="score-item"><b>'+c.name+'</b> ('+c.tee+')<br><small>R: '+c.rating+' S: '+c.slope+'</small>' +
                '<div style="text-align:right; margin-top:5px;">' +
                '<button class="btn-outline" onclick="toggle(\'ed-c-'+i+'\')">Edit</button>' +
                '<button class="btn-outline" style="color:red" onclick="delC('+i+')">Del</button>' +
                '</div>' +
                '<div id="ed-c-'+i+'" class="edit-drawer">' +
                '<label>Rating</label><input type="number" id="er-'+i+'" value="'+c.rating+'" step="0.1">' +
                '<label>Slope</label><input type="number" id="es-'+i+'" value="'+c.slope+'">' +
                '<button onclick="updateC('+i+')">Save Changes</button>' +
                '</div></div>';
        });
        calc();
    }

    function calc(targetScores = scores) {
        if (targetScores.length < 3) return "--";
        var diffs = targetScores.map(s => parseFloat(s.diff)).sort((a,b) => a-b);
        var n = targetScores.length >= 20 ? 8 : (targetScores.length >= 10 ? 3 : 1);
        var avg = diffs.slice(0, n).reduce((a, b) => a + b, 0) / n;
        var res = (Math.floor(avg * 10) / 10).toFixed(1);
        if(targetScores === scores) document.getElementById('idx').innerText = res;
        return res;
    }

    function addS() {
        var cIdx = document.getElementById('cSel').value;
        var val = parseFloat(document.getElementById('sIn').value);
        if(cIdx === "" || isNaN(val)) return alert("Select course and score");
        var c = courses[cIdx];
        var d = ((val - c.rating) * 113 / c.slope).toFixed(1);
        scores.unshift({ date: document.getElementById('dIn').value, courseName: c.name, score: val, diff: d });
        localStorage.setItem('golfScores_v14', JSON.stringify(scores));
        document.getElementById('sIn').value = "";
        render();
    }

    function updateS(i) {
        var newVal = parseFloat(document.getElementById('ev-'+i).value);
        var c = courses.find(x => x.name === (scores[i].courseName || scores[i].course));
        if(c && !isNaN(newVal)) {
            scores[i].score = newVal;
            scores[i].diff = ((newVal - c.rating) * 113 / c.slope).toFixed(1);
            localStorage.setItem('golfScores_v14', JSON.stringify(scores));
            render();
        }
    }

    function addC() {
        var n = document.getElementById('ncN').value;
        var r = parseFloat(document.getElementById('ncR').value);
        var s = parseInt(document.getElementById('ncS').value);
        if(!n || isNaN(r)) return alert("Enter Name and Rating");
        courses.push({ name: n, tee: document.getElementById('ncT').value, rating: r, slope: s });
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        document.getElementById('ncN').value = "";
        toggle('nc');
        render();
    }

    function updateC(i) {
        courses[i].rating = parseFloat(document.getElementById('er-'+i).value);
        courses[i].slope = parseInt(document.getElementById('es-'+i).value);
        localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
        render();
    }

    function delS(i) { if(confirm("Delete round?")) { scores.splice(i, 1); localStorage.setItem('golfScores_v14', JSON.stringify(scores)); render(); } }
    function delC(i) { if(confirm("Delete course?")) { courses.splice(i, 1); localStorage.setItem('golfCourses_v14', JSON.stringify(courses)); render(); } }

    async function sync() {
        if(!pName || !gKey) return alert("Enter Name/Key");
        
        // This creates the "Locker Room" based on the Group Key
        const binId = btoa(gKey).replace(/=/g, ""); 
        
        // We check the separate Admin Password box
        const adminEntry = document.getElementById('adminPassInput').value;
        isAdmin = (adminEntry === "golf2026");

        try {
            const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
            let cloud = res.ok ? await res.json() : { players: {}, courses: [] };
            cloud.players[pName] = { index: document.getElementById('idx').innerText, history: scores.slice(0, 10) };
            
            let cmap = new Map();
            [...cloud.courses, ...courses].forEach(c => cmap.set(c.name+c.tee, c));
            cloud.courses = Array.from(cmap.values());
            courses = cloud.courses;

            await fetch("https://api.jsonstorage.net/v1/json/" + binId, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cloud)
            });
            renderClubhouse(cloud);
            localStorage.setItem('golfCourses_v14', JSON.stringify(courses));
            render();
            alert("Clubhouse Updated!");
        } catch (e) { alert("Sync Error"); }
    }

    function renderClubhouse(cloud) {
        var list = document.getElementById('cbList');
        list.innerHTML = "";
        for (var name in cloud.players) {
            if (name === pName) continue;
            var p = cloud.players[name];
            list.innerHTML += '<div class="score-item">👤 <b>'+name+'</b>: '+p.index + 
            ' <button class="btn-outline" onclick="toggle(\'f-hist-'+name+'\')">View History</button>' +
            '<div id="f-hist-'+name+'" class="edit-drawer">' +
            p.history.map((s, idx) => '<div style="font-size:0.75rem; border-bottom:1px solid #eee; padding:5px 0;">'+s.date+': '+s.score+' '+(isAdmin ? '<button style="color:red; background:none; border:none; font-size:0.6rem;" onclick="adminDel(\''+name+'\','+idx+')">DEL</button>' : '')+'</div>').join('') +
            (isAdmin ? '<div class="admin-box"><label>Add for '+name+'</label><select id="ac-'+name+'"></select><div style="display:flex; gap:5px;"><input type="date" id="ad-'+name+'"><input type="number" id="as-'+name+'" placeholder="Scr"></div><button onclick="adminAdd(\''+name+'\')">Add Score</button></div>' : '') +
            '</div></div>';
            
            if(isAdmin) {
                const sel = document.getElementById('ac-'+name);
                courses.forEach((c, idx) => { sel.innerHTML += '<option value="'+idx+'">'+c.name+'</option>'; });
                document.getElementById('ad-'+name).valueAsDate = new Date();
            }
        }
    }

    async function adminAdd(target) {
        const cIdx = document.getElementById('ac-'+target).value;
        const val = parseFloat(document.getElementById('as-'+target).value);
        const date = document.getElementById('ad-'+target).value;
        const c = courses[cIdx];
        const d = ((val - c.rating) * 113 / c.slope).toFixed(1);
        
        const binId = btoa(isAdmin ? "COMMISSIONER_ROOM" : gKey).replace(/=/g, "");
        const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
        let cloud = await res.json();
        cloud.players[target].history.unshift({ date, courseName: c.name, score: val, diff: d });
        cloud.players[target].index = calc(cloud.players[target].history);
        
        await fetch("https://api.jsonstorage.net/v1/json/" + binId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cloud)
        });
        sync();
    }

    async function adminDel(target, idx) {
        if(!confirm("Delete?")) return;
        const binId = btoa(isAdmin ? "COMMISSIONER_ROOM" : gKey).replace(/=/g, "");
        const res = await fetch("https://api.jsonstorage.net/v1/json/" + binId);
        let cloud = await res.json();
        cloud.players[target].history.splice(idx, 1);
        cloud.players[target].index = calc(cloud.players[target].history);
        await fetch("https://api.jsonstorage.net/v1/json/" + binId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(cloud)
        });
        sync();
    }

    // Init
    document.getElementById('dIn').valueAsDate = new Date();
    document.getElementById('nameIn').value = pName;
    document.getElementById('keyIn').value = gKey;
    isAdmin = (gKey === MASTER_PASS);
    render();
</script>
</body>
</html>
