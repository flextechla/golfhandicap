<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golf Tracker - Deep Search</title>
    <style>
        :root { --primary: #2E7D32; --dark: #1B5E20; --bg: #f4f6f8; --accent: #FFA000; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 15px; }
        .dashboard { background: #333; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; border-bottom: 5px solid red; }
        .card { background: white; border-radius: 10px; margin-bottom: 10px; border: 1px solid #ddd; padding: 15px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; font-size: 1rem; }
        .found-item { background: #fff3e0; padding: 10px; border: 1px solid #ffe0b2; border-radius: 6px; margin-bottom: 8px; font-size: 0.85rem; }
        .score-item { background: #f9f9f9; padding: 12px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        label { font-weight: bold; color: #d32f2f; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div style="font-size: 1.2rem; font-weight: bold;">EMERGENCY DATA SEARCH</div>
    <div id="pDisp">Scanning Browser Memory...</div>
</div>

<div class="card">
    <label>SEARCH PHONE MEMORY</label>
    <p style="font-size: 0.8rem;">Clicking this will search every hidden corner of this browser's memory for your courses and scores.</p>
    <button onclick="deepSearchMemory()" style="background: #fb8c00;">🔍 RUN DEEP MEMORY SCAN</button>
</div>

<div class="card" id="recoveryResults" style="display:none;">
    <label>RECOVERED DATA</label>
    <div id="foundCourses"></div>
    <div id="foundScores" style="margin-top:15px;"></div>
    <button onclick="claimData()" style="background: var(--dark); margin-top:15px;">💾 CLAIM & SAVE ALL FOUND DATA</button>
</div>

<div class="card">
    <label>MANUAL COURSE ENTRY (BACKUP)</label>
    <input type="text" id="cn" placeholder="Course Name" style="width:100%; padding:10px; margin-bottom:5px;">
    <div style="display:flex; gap:5px;">
        <input type="number" id="cr" step="0.1" placeholder="Rating" style="flex:1; padding:10px;">
        <input type="number" id="cs" placeholder="Slope" style="flex:1; padding:10px;">
    </div>
    <button onclick="manualAdd()" style="margin-top:10px;">➕ Add Course Manually</button>
</div>

<div class="card">
    <label>YOUR CURRENT LISTS</label>
    <div id="currentData">No data active yet.</div>
</div>

<script>
    var recoveredCourses = [];
    var recoveredScores = [];

    function deepSearchMemory() {
        recoveredCourses = [];
        recoveredScores = [];
        
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            let val = localStorage.getItem(key);
            
            try {
                let data = JSON.parse(val);
                if (Array.isArray(data)) {
                    data.forEach(item => {
                        // Check for courses
                        if (item.rating && item.slope && item.name) {
                            recoveredCourses.push(item);
                        }
                        // Check for scores
                        if (item.score && item.diff) {
                            recoveredScores.push(item);
                        }
                    });
                }
            } catch (e) {}
        }

        // De-duplicate
        recoveredCourses = recoveredCourses.filter((v,i,a)=>a.findIndex(t=>(t.name===v.name && t.tee===v.tee))===i);
        recoveredScores = recoveredScores.filter((v,i,a)=>a.findIndex(t=>(t.date===v.date && t.score===v.score))===i);

        let resBox = document.getElementById('recoveryResults');
        resBox.style.display = "block";
        
        document.getElementById('foundCourses').innerHTML = "Found <b>" + recoveredCourses.length + "</b> Course Ratings.";
        document.getElementById('foundScores').innerHTML = "Found <b>" + recoveredScores.length + "</b> Past Scores.";
        
        if(recoveredCourses.length === 0 && recoveredScores.length === 0) {
            alert("Deep Scan finished: No data found in this browser's memory.");
        }
    }

    function claimData() {
        if (recoveredCourses.length > 0) {
            localStorage.setItem('golfCourses_v14', JSON.stringify(recoveredCourses));
        }
        if (recoveredScores.length > 0) {
            localStorage.setItem('scores_Don', JSON.stringify(recoveredScores));
        }
        alert("Data claimed! Refreshing app...");
        location.reload();
    }

    function manualAdd() {
        let n = document.getElementById('cn').value;
        let r = parseFloat(document.getElementById('cr').value);
        let s = parseInt(document.getElementById('cs').value);
        let existing = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
        existing.push({name: n, tee: "Standard", rating: r, slope: s});
        localStorage.setItem('golfCourses_v14', JSON.stringify(existing));
        location.reload();
    }

    window.onload = function() {
        let c = JSON.parse(localStorage.getItem('golfCourses_v14')) || [];
        let s = JSON.parse(localStorage.getItem('scores_Don')) || [];
        let list = document.getElementById('currentData');
        list.innerHTML = "<b>Courses:</b> " + c.length + "<br><b>Scores:</b> " + s.length;
    };
</script>
</body>
</html>
