<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golf Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --primary: #2e7d32; --dark: #1b5e20; --accent: #ffa000; --bg: #f4f6f8; --danger: #d32f2f; }
    body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; }
    .dashboard-header { background: linear-gradient(135deg, var(--primary), var(--dark)); color: white; padding: 25px 20px; text-align: center; border-bottom: 5px solid var(--accent); }
    .hcp-display { font-size: 4rem; font-weight: 900; margin: 10px 0; }
    .nav-tabs { display: flex; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .tab-link { flex: 1; padding: 15px; text-align: center; font-size: 0.7rem; font-weight: bold; cursor: pointer; color: #666; border-bottom: 3px solid transparent; }
    .tab-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    .card { background: white; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid #ddd; }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 10px; }
    .btn-primary { background: var(--primary); color: white; }
    .form-control { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="view-auth" class="container" style="margin-top: 10vh;">
  <div class="card" style="text-align: center;">
    <h2 style="color: var(--primary);">⛳ Golf Tracker</h2>
    <input type="email" id="email" class="form-control" placeholder="Email">
    <input type="password" id="password" class="form-control" placeholder="Password">
    <button class="btn btn-primary" onclick="handleAuth()">Sign In / Create Account</button>
    <div id="auth-error" style="color:red; font-size:0.8rem;"></div>
  </div>
</div>

<div id="view-app" class="hidden">
  <div class="dashboard-header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span id="user-display-name" style="font-weight: bold;">Golfer</span>
      <button onclick="sb.auth.signOut()" style="background:none; border:1px solid white; color:white; border-radius:4px; padding:4px 10px;">Logout</button>
    </div>
    <div class="hcp-display" id="dash-hcp">--</div>
    <div style="font-size: 0.7rem; font-weight: bold;">WHS HANDICAP INDEX</div>
  </div>

  <div class="nav-tabs">
    <div class="tab-link active" onclick="showTab('dash', this)">DASHBOARD</div>
    <div class="tab-link" onclick="showTab('add', this)">ADD SCORE</div>
    <div class="tab-link" onclick="showTab('leader', this)">RANKINGS</div>
    <div class="tab-link" onclick="showTab('groups', this)">GROUPS</div>
    <div class="tab-link" onclick="showTab('settings', this)">SETTINGS</div>
  </div>

  <div class="container">
    <div id="tab-dash">
      <div class="card"><h3>Recent Rounds</h3><div id="recent-list"></div></div>
    </div>
    <div id="tab-add" class="hidden">
      <div class="card">
        <h3>Post Score</h3>
        <select id="course-sel" class="form-control"></select>
        <input type="number" id="r-score" class="form-control" placeholder="Score">
        <input type="date" id="r-date" class="form-control">
        <button class="btn btn-primary" onclick="saveScore()">Save</button>
      </div>
    </div>
    <div id="tab-leader" class="hidden"><div class="card"><h3>Rankings</h3><div id="lb-list"></div></div></div>
    <div id="tab-groups" class="hidden"><div class="card"><h3>My Groups</h3><div id="group-list"></div></div></div>
    <div id="tab-settings" class="hidden"><div class="card"><h3>Settings</h3><button class="btn" style="background:red; color:white;" onclick="deleteAcc()">Delete Account</button></div></div>
  </div>
</div>

<script>
  const S_URL = 'https://vonbibroncsxrgstetow.supabase.co'; //
  const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvbmJpYnJvbmNzeHJnc3RldG93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg1MjExMTQsImV4cCI6MjA4NDA5NzExNH0.z0x4uu-34dc2cpWK2CTZSGW9gY2a3pl-t1ANk7gyouk'; //
  const sb = supabase.createClient(S_URL, S_KEY);

  async function handleAuth() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      const { error: sError } = await sb.auth.signUp({ email, password });
      if (sError) document.getElementById('auth-error').innerText = sError.message;
      else alert("Account created! Please Sign In.");
    }
  }

  sb.auth.onAuthStateChange((event, session) => {
    if (session) {
      document.getElementById('view-auth').classList.add('hidden');
      document.getElementById('view-app').classList.remove('hidden');
      initApp();
    } else {
      document.getElementById('view-auth').classList.remove('hidden');
      document.getElementById('view-app').classList.add('hidden');
    }
  });

  async function initApp() {
    const courses = [
      { name: "Beaver Creek", rating: 72, slope: 130 },
      { name: "Santa Maria", rating: 71.5, slope: 128 },
      { name: "The Island", rating: 73.1, slope: 135 }
    ];
    const sel = document.getElementById('course-sel');
    sel.innerHTML = courses.map(c => `<option value="${c.rating}|${c.slope}">${c.name}</option>`).join('');
    document.getElementById('r-date').valueAsDate = new Date();
  }

  function showTab(tab, el) {
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
  }
</script>
</body>
</html>
